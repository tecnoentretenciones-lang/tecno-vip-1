<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PANEL VIP</title>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; padding: 20px; }
        .panel { max-width: 1000px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 2px solid #00e5ff; }
        h1 { color: #00e5ff; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: left; }
        th { background: #00e5ff; color: black; }
        .btn-borrar { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .btn-borrar:hover { background: #c0392b; }
        .btn-refresh { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        .status-activo { color: #2ecc71; font-weight: bold; }
        .status-pendiente { color: #f1c40f; font-weight: bold; }
    </style>
</head>
<body>
<div class="panel">
    <h1>ADMIN TECNOENTRETE VIP</h1>
    <button class="btn-refresh" onclick="cargar()">🔄 ACTUALIZAR LISTA</button>
    <table id="t">
        <thead><tr><th>FILA</th><th>LICENCIA</th><th>NOMBRE</th><th>ESTADO</th><th>WHATSAPP</th><th>ACCIONES</th></tr></thead>
        <tbody></tbody>
    </table>
</div>
<script>
    // TU ENLACE REAL YA ESTÁ AQUÍ
    const API = "https://script.google.com/macros/s/AKfycbzUIdq4jKKOi3_fu3kLsO_cP3Z9ckXp7B6sUiP78B7Km7bDVmaecAIdsWGgGcA8nlE8JA/exec"; 
    
    async function cargar() {
        const btn = document.querySelector('.btn-refresh'); btn.innerText = "CARGANDO DATOS...";
        try {
            const r = await fetch(API + "?action=panel_datos"); 
            const d = await r.json();
            const b = document.querySelector("#t tbody"); b.innerHTML = "";
            d.datos.forEach((f, i) => {
                if (i === 0) return;
                const tr = document.createElement("tr");
                const claseEstado = f[2] === "Activo" ? "status-activo" : "status-pendiente";
                tr.innerHTML = `<td>${i+1}</td><td>${f[0] || '---'}</td><td>${f[11]||'---'}</td><td class="${claseEstado}">${f[2] || '---'}</td><td>${f[12]||'---'}</td><td><button class="btn-borrar" onclick="borrar(${i+1})">BORRAR FILA</button></td>`;
                b.appendChild(tr);
            });
            btn.innerText = "🔄 ACTUALIZAR LISTA";
        } catch(e) {
            alert("Error al conectar con el servidor.");
            btn.innerText = "🔄 ACTUALIZAR LISTA";
        }
    }
    
    async function borrar(n) { 
        if(confirm("¿Seguro que quieres borrar esta fila permanentemente?")){ 
            await fetch(API + "?action=borrar_fila&fila=" + n); 
            cargar(); 
        } 
    }
    
    window.onload = cargar;
</script>
</body>
</html>
