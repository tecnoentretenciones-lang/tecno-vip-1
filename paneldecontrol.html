<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PANEL VIP - TECNOENTRETE</title>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; padding: 20px; margin: 0; }
        .panel { max-width: 1200px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 2px solid #00e5ff; box-shadow: 0 0 20px rgba(0,229,255,0.2); }
        h1 { color: #00e5ff; text-align: center; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; background: #111; }
        th, td { border: 1px solid #333; padding: 12px; text-align: left; vertical-align: middle; }
        th { background: #00e5ff; color: black; font-weight: 900; }
        
        .btn-borrar { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 4px; }
        .btn-borrar:hover { background: #c0392b; }
        
        .btn-sus { background: #f39c12; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-sus:hover { background: #d68910; }
        
        .btn-act { background: #2ecc71; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-act:hover { background: #27ae60; }
        
        .btn-refresh { background: #00e5ff; color: #000; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 900; font-size: 16px; margin-bottom: 10px; }
        .btn-refresh:hover { background: #00b8cc; }
        
        .status-activo { color: #2ecc71; font-weight: bold; }
        .status-pendiente { color: #f1c40f; font-weight: bold; }
        .status-inactivo { color: #e74c3c; font-weight: bold; }
        .conn-box { background: #222; padding: 5px 8px; border-radius: 5px; border: 1px solid #444; font-family: monospace; font-size: 11px; }
    </style>
</head>
<body>
<div class="panel">
    <h1><i class="fas fa-shield-alt"></i> CENTRO DE MANDO VIP</h1>
    <button class="btn-refresh" onclick="cargar()">🔄 ACTUALIZAR MONITOR EN TIEMPO REAL</button>
    <div style="overflow-x: auto;">
        <table id="t">
            <thead>
                <tr>
                    <th>#</th>
                    <th>LICENCIA</th>
                    <th>NOMBRE</th>
                    <th>WHATSAPP</th>
                    <th>ESTADO</th>
                    <th>⏱️ TIEMPO / CONEXIÓN</th>
                    <th>ACCIONES</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>
<script>
    // ====== TU ENLACE REAL YA ESTÁ PUESTO AQUÍ ======
    const API = "https://script.google.com/macros/s/AKfycbzUIdq4jKKOi3_fu3kLsO_cP3Z9ckXp7B6sUiP78B7Km7bDVmaecAIdsWGgGcA8nlE8JA/exec"; 
    
    async function cargar() {
        const btn = document.querySelector('.btn-refresh'); btn.innerText = "⏳ CARGANDO DATOS DEL SERVIDOR...";
        try {
            const r = await fetch(API + "?action=panel_datos"); 
            const d = await r.json();
            const b = document.querySelector("#t tbody"); b.innerHTML = "";
            d.datos.forEach((f, i) => {
                if (i === 0) return; 
                
                const tr = document.createElement("tr");
                let claseEstado = "status-pendiente";
                if(f[2] === "Activo") claseEstado = "status-activo";
                if(f[2] === "Inactivo") claseEstado = "status-inactivo";

                let btnAccion = f[2] === "Activo" 
                    ? `<button class="btn-sus" onclick="cambiarEstado(${i+1}, 'Inactivo')">⏸️ SUSPENDER</button>` 
                    : `<button class="btn-act" onclick="cambiarEstado(${i+1}, 'Activo')">▶️ ACTIVAR</button>`;

                tr.innerHTML = `
                    <td>${i+1}</td>
                    <td><strong>${f[0] || '---'}</strong></td>
                    <td>${f[11] || '---'}</td>
                    <td>${f[12] || '---'}</td>
                    <td class="${claseEstado}">${f[2] || '---'}</td>
                    <td><div class="conn-box">${f[3] || '---'}</div></td>
                    <td>
                        <button class="btn-borrar" onclick="borrar(${i+1})">🗑️ BORRAR</button>
                        ${btnAccion}
                    </td>
                `;
                b.appendChild(tr);
            });
            btn.innerText = "🔄 ACTUALIZAR MONITOR EN TIEMPO REAL";
        } catch(e) {
            alert("Error al conectar con el servidor.");
            btn.innerText = "🔄 ACTUALIZAR MONITOR EN TIEMPO REAL";
        }
    }
    
    async function borrar(n) {
