<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control VIP - TECNOENTRETE</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #f39c12;
            text-shadow: 0 0 10px #f39c12;
            margin-bottom: 5px;
        }
        .panel-container {
            background: #2c3e50;
            max-width: 600px;
            margin: 20px auto;
            padding: 30px;
            border-radius: 12px;
            border: 2px solid #f39c12;
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.2);
        }
        
        /* LA CAJA DE INGRESO */
        .caja-ingreso {
            background: #34495e;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px dashed #f39c12;
        }
        input[type="number"] {
            width: 100px;
            padding: 15px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            border: 2px solid #e67e22;
            background: #111;
            color: #fff;
            border-radius: 8px;
            outline: none;
        }
        button.btn-agregar {
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(45deg, #d35400, #e67e22);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 10px;
            transition: 0.2s;
        }
        button.btn-agregar:hover {
            transform: scale(1.05);
        }

        /* HISTORIAL */
        .historial-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            min-height: 50px;
            padding: 15px;
            background: #1a252f;
            border-radius: 8px;
        }
        .bola {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 20px;
            font-weight: bold;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .rojo { background-color: #c0392b; }
        .negro { background-color: #2c3e50; border: 1px solid #7f8c8d; }
        .verde { background-color: #27ae60; }

        .btn-volver {
            margin-top: 20px;
            padding: 10px 20px;
            background: #7f8c8d;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
<body>

    <h1>PANEL DE CONTROL</h1>
    <p>Motor de Análisis de Ruleta Activo</p>

    <div class="panel-container">
        
        <div class="caja-ingreso">
            <h3 style="margin-top:0;">Ingreso de Datos</h3>
            <input type="number" id="numeroRuleta" min="0" max="36" placeholder="0" onkeypress="ingresarConEnter(event)">
            <button class="btn-agregar" onclick="registrarNumero()">AGREGAR</button>
        </div>

        <div id="status-analisis" style="color: #2ecc71; font-weight: bold; margin: 15px 0;">
            Sistema listo. Esperando ingresos para calcular...
        </div>

        <h3>Historial de la Mesa</h3>
        <div class="historial-container" id="historial">
            </div>

    </div>

    <a href="index.html" class="btn-volver">Volver al Inicio</a>

    <script>
        // Lógica de colores de la ruleta europea
        const numerosRojos = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
        let historialTiros = [];

        function registrarNumero() {
            const input = document.getElementById('numeroRuleta');
            const valor = parseInt(input.value);

            // Validar que no quede en blanco y sea un número de ruleta
            if (isNaN(valor) || valor < 0 || valor > 36) {
                alert("Por favor, ingresa un número válido del 0 al 36.");
                return;
            }

            // Guardar en el arreglo
            historialTiros.push(valor);
            
            // Actualizar la pantalla
            dibujarHistorial();
            analizarDatos();

            // Limpiar la caja para el siguiente tiro
            input.value = '';
            input.focus();
        }

        function dibujarHistorial() {
            const contenedor = document.getElementById('historial');
            contenedor.innerHTML = ''; // Limpiar antes de dibujar

            historialTiros.forEach(num => {
                let colorClase = 'negro'; // Por defecto negro
                
                if (num === 0) {
                    colorClase = 'verde';
                } else if (numerosRojos.includes(num)) {
                    colorClase = 'rojo';
                }

                // Crear la bola visualmente
                const bola = document.createElement('div');
                bola.className = `bola ${colorClase}`;
                bola.textContent = num;
                contenedor.appendChild(bola);
            });
        }

        function analizarDatos() {
            const status = document.getElementById('status-analisis');
            if (historialTiros.length >= 3) {
                status.textContent = "⚙️ Analizando patrón... Mantener estrategia.";
                status.style.color = "#f39c12";
            }
        }

        // Para que se pueda agregar presionando la tecla "Enter"
        function ingresarConEnter(event) {
            if (event.key === "Enter") {
                registrarNumero();
            }
        }
    </script>
</body>
</html>
