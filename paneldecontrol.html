
<script>
    const API = "https://script.google.com/macros/s/AKfycbzUIdq4jKKOi3_fu3kLsO_cP3Z9ckXp7B6sUiP78B7Km7bDVmaecAIdsWGgGcA8nlE8JA/exec";
    let USUARIO_ACTUAL = ""; let ROL_ACTUAL = "";

    async function verificarLogin() {
        const u = document.getElementById('l-user').value; const p = document.getElementById('l-pass').value;
        const r = await fetch(`${API}?action=login_panel&user=${u}&pass=${p}`); const d = await r.json();
        if(d.status === "success") {
            USUARIO_ACTUAL = u; ROL_ACTUAL = d.role;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-panel').style.display = 'block';
            if(ROL_ACTUAL === "CAJERO") { document.getElementById('btn-tab-cajeros').style.display = 'none'; document.getElementById('box-lucro-jugadores').style.display = 'none'; }
            cargarUsuarios(); cargarTrampas();
        } else { alert(d.mensaje); }
    }

    function cambiarTab(tab, btn) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active'); btn.classList.add('active');
        if(tab === 'cajeros') cargarCajeros();
    }

    async function cargarUsuarios() {
        const r = await fetch(API + "?action=panel_datos"); const d = await r.json();
        const b = document.querySelector("#t-u tbody"); b.innerHTML = "";
        let sG = 0; let sV = 0;
        d.datos.forEach((f, i) => {
            if (i === 0 || !f[0]) return;
            if (ROL_ACTUAL === "CAJERO" && f[14] !== USUARIO_ACTUAL) return; 
            let neto = parseFloat(f[10]) || 0; let pago = parseFloat(f[13]) || 0;
            let claveReal = f[15] || '--'; // AQUÍ CORREGIMOS EL ERROR (LEE DE LA COLUMNA P)
            sG += neto; sV += pago;
            let btnB = (ROL_ACTUAL === "ADMIN") ? `<button class="btn-accion" style="background:#e74c3c; color:white;" onclick="borrar(${i+1})">ELIMINAR</button>` : '';
            b.innerHTML += `<tr><td>${f[0]}</td><td style="color:#f1c40f; font-weight:bold;">${claveReal}</td><td>${f[11]||'--'}</td><td>${f[9]||'BASICO'}</td><td>${f[2]}</td><td>${f[3]}</td><td>$${neto.toFixed(2)}</td><td>$${pago}</td><td>${f[14]}</td><td><button class="btn-accion" style="background:#f39c12; color:white;" onclick="cambiarEstado(${i+1},'${f[2]==='Activo'?'Inactivo':'Activo'}')">PAUSAR/ACT</button><button class="btn-accion" style="background:#3498db; color:white;" onclick="abrirModal(${i+1})">+ TIEMPO</button>${btnB}</td></tr>`;
        });
        document.getElementById('v-v').innerText = '$' + sV; document.getElementById('v-g').innerText = '$' + sG.toFixed(2);
    }

    async function cargarTrampas() {
        const r = await fetch(API + "?action=panel_trampas"); const d = await r.json();
        const b = document.querySelector("#t-trampas tbody"); b.innerHTML = "";
        d.datos.forEach((f, i) => { if (i > 0 && f[2]) b.innerHTML += `<tr><td>${new Date(f[0]).toLocaleDateString()}</td><td>${f[1]}</td><td>${f[2]}</td></tr>`; });
    }

    async function crearLicencia() {
        const u = document.getElementById('n-u').value; const p = document.getElementById('n-p').value;
        const n = document.getElementById('n-n').value; const w = document.getElementById('n-w').value;
        const t = document.getElementById('n-t').value; const pl = document.getElementById('n-pl').value;
        const pa = document.getElementById('n-pa').value;
        await fetch(`${API}?action=crear_usuario&serial=${u}&pass=${p}&nombre=${n}&wsp=${w}&tiempo=${t}&plan=${pl}&pago=${pa}&vendedor=${USUARIO_ACTUAL}`);
        cargarUsuarios();
    }

    async function cargarCajeros() {
        const r = await fetch(API + "?action=panel_cajeros"); const d = await r.json();
        const b = document.querySelector("#t-c tbody"); b.innerHTML = "";
        d.datos.forEach((f, i) => { if(i>0) b.innerHTML += `<tr><td>${f[0]}</td><td>${f[1]}</td><td>${f[2]}</td><td>${f[4]}</td><td><button class="btn-accion" style="background:#e74c3c; color:white;" onclick="borrarCajero(${i+1})">ELIMINAR</button></td></tr>`; });
    }
    async function crearCajero() {
        const u = document.getElementById('c-u').value; const p = document.getElementById('c-p').value; const n = document.getElementById('c-n').value;
        await fetch(`${API}?action=crear_cajero&user=${u}&pass=${p}&nombre=${n}`); cargarCajeros();
    }
    async function borrarCajero(f) { if(confirm("¿Eliminar?")) { await fetch(`${API}?action=borrar_cajero&fila=${f}`); cargarCajeros(); } }
    async function borrar(f) { if(confirm("¿Eliminar Cliente?")) { await fetch(`${API}?action=borrar_fila&fila=${f}`); cargarUsuarios(); } }
    async function cambiarEstado(f, e) { await fetch(`${API}?action=cambiar_estado&fila=${f}&estado=${e}`); cargarUsuarios(); }
    function abrirModal(f) { document.getElementById('f-t').value = f; document.getElementById('modal-tiempo').style.display = 'flex'; }
    async function enviarTiempo() { const f = document.getElementById('f-t').value; const d = document.getElementById('add-d').value; await fetch(`${API}?action=agregar_tiempo&fila=${f}&dias=${d}`); document.getElementById('modal-tiempo').style.display='none'; cargarUsuarios(); }
</script>
