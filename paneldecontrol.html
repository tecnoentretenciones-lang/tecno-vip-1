<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA CENTRAL - TECNOENTRETE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; padding: 20px; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 100; }
        .login-box { background: #111; padding: 30px; border-radius: 15px; border: 2px solid #00e5ff; text-align: center; }
        input { background: #222; color: #fff; border: 1px solid #444; padding: 10px; margin: 10px 0; width: 100%; border-radius: 5px; }
        button { background: #00e5ff; color: #000; border: none; padding: 10px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .panel { display: none; max-width: 1200px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #111; font-size: 13px;}
        th, td { border: 1px solid #333; padding: 10px; text-align: center; }
        th { background: #00e5ff; color: #000; }
        .btn-refresh { background: #27ae60; color: #fff; margin-bottom: 20px; padding: 10px; width: auto; display: inline-block; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2>SISTEMA MAESTRO</h2>
        <input type="text" id="user-admin" placeholder="Usuario">
        <input type="password" id="clave-admin" placeholder="Clave">
        <button onclick="verificarLogin()">INGRESAR</button>
    </div>
</div>

<div class="panel" id="panel-principal">
    <h1>PANEL DE GESTIÓN TECNOENTRETE</h1>
    <div class="btn-refresh" onclick="cargarUsuarios()">🔄 ACTUALIZAR DATOS</div>
    
    <div style="background:#111; padding:15px; border-radius:10px; margin-bottom:20px;">
        <h3>Crear Nueva Licencia</h3>
        <div style="display:flex; gap:10px; flex-wrap:wrap">
            <input style="flex:1" type="text" id="n-usuario" placeholder="Usuario Login">
            <input style="flex:1" type="text" id="n-serial" placeholder="Clave/Licencia">
            <input style="flex:1" type="text" id="n-nombre" placeholder="Nombre Cliente">
            <input style="flex:1" type="text" id="n-wsp" placeholder="WhatsApp">
            <select id="n-tiempo" style="background:#222; color:#fff; border:1px solid #444; padding:10px; border-radius:5px">
                <option value="01d-00h:00m:00s">24 Horas</option>
                <option value="07d-00h:00m:00s">7 Días</option>
                <option value="30d-00h:00m:00s">30 Días</option>
            </select>
            <button style="width:150px" onclick="crearUsuario()">GENERAR</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>#</th><th>USUARIO</th><th>CLAVE</th><th>TOKEN</th><th>NOMBRE</th><th>WSP</th><th>PLAN</th><th>ESTADO</th><th>TIEMPO RESTANTE</th><th>ACCIONES</th>
            </tr>
        </thead>
        <tbody id="lista-usuarios"></tbody>
    </table>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbVAoiVPr4M2x3qZjW2jEL9yn633Rc7FqcXZaSMzIf6uant1VbLPV7ScwSudHslJYOuzw/exec";

    async function verificarLogin() {
        const u = document.getElementById('user-admin').value;
        const p = document.getElementById('clave-admin').value;
        if(u === "tecnoentrete" && p === "777") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('panel-principal').style.display = 'block';
            cargarUsuarios();
        } else { alert("Datos incorrectos"); }
    }

    async function cargarUsuarios() {
        const b = document.getElementById('lista-usuarios');
        b.innerHTML = "<tr><td colspan='10'>Cargando datos del servidor...</td></tr>";
        try {
            const r = await fetch(API + "?action=panel_datos&vendedor=ADMIN");
            const d = await r.json();
            b.innerHTML = "";
            d.datos.forEach((f, i) => {
                if(i === 0) return;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${i}</td>
                    <td style="color:#f1c40f">${f[14] || '--'}</td>
                    <td style="color:#00e5ff">${f[0]}</td>
                    <td style="font-size:10px; color:#aaa">${f[4] || '--'}</td>
                    <td>${f[11] || '--'}</td>
                    <td>${f[12] || '--'}</td>
                    <td>${f[13] || 'BASICO'}</td>
                    <td style="color:${f[2]==='Activo'?'#2ecc71':'#e74c3c'}">${f[2]}</td>
                    <td>${f[3]}</td>
                    <td>
                        <button style="background:#e74c3c; color:white; padding:5px; font-size:10px" onclick="borrar(${f[17]})">ELIMINAR</button>
                    </td>
                `;
                b.appendChild(tr);
            });
        } catch(e) { b.innerHTML = "<tr><td colspan='10'>Error de conexión: "+e+"</td></tr>"; }
    }

    async function crearUsuario() {
        const u = document.getElementById('n-usuario').value;
        const s = document.getElementById('n-serial').value;
        const n = document.getElementById('n-nombre').value;
        const w = document.getElementById('n-wsp').value;
        const t = document.getElementById('n-tiempo').value;
        if(!s) return alert("Pon la clave");
        await fetch(API + `?action=crear_usuario&usuario=${u}&serial=${s}&nombre=${n}&wsp=${w}&tiempo=${t}&vendedor=ADMIN`);
        cargarUsuarios();
    }

    async function borrar(fila) {
        if(confirm("¿Eliminar licencia?")) {
            await fetch(API + `?action=borrar_fila&fila=${fila}`);
            cargarUsuarios();
        }
    }
</script>
</body>
</html>
