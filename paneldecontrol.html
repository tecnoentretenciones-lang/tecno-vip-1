<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTRAL - TECNOENTRETE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; padding: 20px; margin: 0;}
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 100; }
        .box { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 2px solid #00e5ff; text-align: center; width: 320px; }
        input, select { background: #222; color: #fff; border: 1px solid #444; padding: 12px; margin: 10px 0; width: 100%; border-radius: 5px; box-sizing: border-box; outline: none;}
        button { background: #00e5ff; color: #000; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .main { display: none; max-width: 1200px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; background: #111;}
        th, td { border: 1px solid #333; padding: 10px; text-align: center; }
        th { background: #00e5ff; color: #000; font-weight: 900; }
        .btn-red { background: #e74c3c; color: white; padding: 5px 10px; width: auto; font-size: 11px;}
    </style>
</head>
<body>

<div id="l-s" class="login-screen">
    <div class="box">
        <h2>SISTEMA MAESTRO</h2>
        <input type="text" id="u-a" placeholder="Usuario">
        <input type="password" id="c-a" placeholder="Clave">
        <button onclick="login()">INGRESAR AL PANEL</button>
    </div>
</div>

<div id="p-m" class="main">
    <h1>PANEL DE GESTIÓN TECNOENTRETE</h1>
    
    <div style="background:#111; padding:20px; border-radius:10px; border: 1px solid #333;">
        <h3>Crear Nueva Licencia</h3>
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap:10px;">
            <input type="text" id="n-u" placeholder="Usuario Login">
            <input type="text" id="n-s" placeholder="Clave/Serial">
            <input type="text" id="n-n" placeholder="Nombre Cliente">
            <input type="text" id="n-w" placeholder="WhatsApp">
            <select id="n-t">
                <option value="01d-00h:00m:00s">24 Horas</option>
                <option value="07d-00h:00m:00s">7 Días</option>
                <option value="30d-00h:00m:00s">30 Días</option>
            </select>
            <button onclick="crear()">GENERAR</button>
        </div>
    </div>

    <button onclick="cargar()" style="margin-top:20px; background:#27ae60; color:white; width:auto; padding:10px 20px;">🔄 ACTUALIZAR LISTA</button>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>#</th><th>USUARIO</th><th>CLAVE</th><th>TOKEN</th><th>ESTADO</th><th>TIEMPO</th><th>ACCIONES</th>
                </tr>
            </thead>
            <tbody id="lista"></tbody>
        </table>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbzVAoiVPr4M2x3qZjW2jEL9yn633Rc7FqcXZaSMzIf6uant1VbLPV7ScwSudHslJYOuzw/exec";

    function login() {
        const u = document.getElementById('u-a').value;
        const p = document.getElementById('clave-admin').value; // Nota: en tu snippet original decia 'clave-admin' aunque el id fuera 'c-a', lo corregire para que funcione con el id 'c-a'
        const p_val = document.getElementById('c-a').value;
        if(u === "tecnoentrete" && p_val === "777") {
            document.getElementById('l-s').style.display = 'none';
            document.getElementById('p-m').style.display = 'block';
            cargar();
        } else { alert("Usuario o Clave incorrectos"); }
    }

    async function cargar() {
        const b = document.getElementById('lista');
        b.innerHTML = "<tr><td colspan='7'>Cargando datos...</td></tr>";
        try {
            const r = await fetch(API + "?action=panel_datos&vendedor=ADMIN");
            const d = await r.json();
            b.innerHTML = "";
            d.datos.forEach((f, i) => {
                if(i === 0) return;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${i}</td>
                    <td style="color:#f1c40f; font-weight:bold;">${f[14] || '--'}</td>
                    <td style="color:#00e5ff">${f[0]}</td>
                    <td style="font-size:10px; color:#aaa">${f[4] || '--'}</td>
                    <td style="font-weight:bold; color:${f[2]==='Activo'?'#2ecc71':'#e74c3c'}">${f[2]}</td>
                    <td>${f[3]}</td>
                    <td>
                        <button class="btn-red" onclick="borrar(${f[17]})">ELIMINAR</button>
                    </td>
                `;
                b.appendChild(tr);
            });
        } catch(e) { b.innerHTML = "<tr><td colspan='7'>Error de conexión con el servidor</td></tr>"; }
    }

    async function crear() {
        const u = document.getElementById('n-u').value;
        const s = document.getElementById('n-s').value;
        const n = document.getElementById('n-n').value;
        const w = document.getElementById('n-w').value;
        const t = document.getElementById('n-t').value;
        if(!s) return alert("Falta ingresar la Clave");
        await fetch(API + `?action=crear_usuario&usuario=${encodeURIComponent(u)}&serial=${encodeURIComponent(s)}&nombre=${encodeURIComponent(n)}&wsp=${w}&tiempo=${t}&vendedor=ADMIN`);
        cargar();
    }

    async function borrar(fila) {
        if(confirm("¿Eliminar licencia definitivamente?")) {
            await fetch(API + `?action=borrar_fila&fila=${fila}`);
            cargar();
        }
    }
</script>
</body>
</html>
