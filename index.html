
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>TECNOENTRETE VIP v55.2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --c1: #e74c3c; --c2: #2c3e50; --c3: #27ae60; --c4: #f1c40f; --c5: #00e5ff; --c8: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none !important; -webkit-user-select: none !important; }
        html, body { height: 100dvh; width: 100vw; overflow: hidden; margin: 0; color: white; font-family: 'Segoe UI', sans-serif; background: url('https://raw.githubusercontent.com/tecnoentretenciones-lang/tecno-vip-1/main/image_1209a3.jpg') no-repeat center center fixed; background-size: cover; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: -1; }
        body { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
        #p-l, #app-principal { width: 100%; height: 100dvh; max-width: 500px; display: flex; flex-direction: column; padding: 12px; }
        #p-l { position: fixed; top: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; }
        .c-l { background: rgba(20, 20, 20, 0.95); border: 2px solid var(--c5); border-radius: 25px; padding: 25px; width: 100%; text-align: center; box-shadow: 0 0 30px rgba(0,229,255,0.2); }
        .ruleta-logo { width: 70px; height: 70px; margin-bottom: 10px; animation: rotar 5s linear infinite; filter: drop-shadow(0 0 10px var(--c5)); }
        @keyframes rotar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .legal-box { background: rgba(231, 76, 60, 0.2); border: 1px solid var(--c1); padding: 10px; border-radius: 12px; margin-bottom: 15px; font-size: 11px; color: #ff8888; font-weight: bold; }
        .i-s { width: 100%; background: #000; border: 2px solid #555; color: var(--c4); padding: 15px; border-radius: 12px; font-size: 22px; text-align: center; margin-bottom: 15px; outline: none; font-weight: bold; }
        .b-a { background: var(--c5); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 16px; margin-bottom: 10px; }
        #app-principal { display: none; }
        .tmr-big { background:#000; border:2px solid var(--c5); border-radius:15px; padding:15px; text-align:center; font-size: 32px; color: var(--c5); font-weight: 900; margin-bottom:8px; text-shadow: 0 0 10px var(--c5); }
        .ganancia-box { background: #000; border: 1px solid #333; border-radius: 15px; padding: 12px; display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        .stats-row { display: flex; justify-content: space-around; width: 100%; }
        .panel { background: var(--c8); border: 1px solid #333; border-radius: 15px; padding: 15px; display: flex; flex-direction: column; gap: 10px; flex-grow: 1; justify-content: space-around; }
        .b-i { flex: 1; height: 75px; border: none; border-radius: 15px; font-size: 32px; font-weight: bold; color: white; cursor: pointer; }
        .bola { width: 25px; height: 25px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; margin: 2px; }
        .c-c { background: #000; border: 1px solid #222; border-radius: 12px; padding: 8px; display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; height: 95px; overflow-y: auto; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="p-l">
        <div class="c-l">
            <img src="https://cdn-icons-png.flaticon.com/512/1055/1055673.png" class="ruleta-logo">
            <h1 style="margin: 0 0 5px 0; font-size: 24px;">TECNOENTRETE VIP</h1>
            <p style="font-size: 14px; color: var(--c4); font-weight: bold; margin-bottom: 15px;">SOFTWARE PROFESIONAL</p>
            <div class="legal-box">⚠️ AVISO: Uso bajo su propia responsabilidad.</div>
            <div id="e-m" style="color: #ff4757; font-size: 13px; margin-bottom: 10px; font-weight: bold;"></div>
            <button id="btn-acepto" class="b-a">ACEPTO Y COMIENZO</button>
            <div id="step-1" style="display:none"><input type="text" id="l-i" class="i-s" placeholder="LICENCIA"><button class="b-a" id="btn-validar">VALIDAR LICENCIA</button></div>
            <div id="step-2" style="display:none"><input type="number" id="c-init" class="i-s" placeholder="SALDO MESA"><button class="b-a" id="btn-entrar">ENTRAR A JUGAR</button><div id="btn-continuar-box" style="display:none; margin-top:10px;"><button class="b-a" id="btn-continuar-sesion" style="background:#27ae60; color:white;">SINCRONIZAR PARTIDA</button></div></div>
        </div>
    </div>

    <div id="app-principal">
        <div id="tmr" class="tmr-big">00d 00h 00m 00s</div>
        <div class="ganancia-box">
            <div class="stats-row">
                <div style="flex: 1; border-right: 1px solid #333; text-align: center;"><div style="font-size: 10px; color: #888;">SALDO ACTUAL</div><div style="font-size: 22px; font-weight: 900;" id="cap-val">$0.00</div></div>
                <div style="flex: 1; text-align: center;"><div style="font-size: 10px; color: #888;">NETO GLOBAL</div><div style="font-size: 22px; font-weight: 900; color: var(--c5);" id="n-g">$0.00</div></div>
            </div>
        </div>
        <div class="panel">
            <div id="s-t" style="font-size:75px; font-weight:900; text-align:center;">---</div>
            <div id="m-t" style="color:var(--c3); font-weight:900; font-size:26px; text-align:center;">$0.20</div>
            <div style="display: flex; gap: 10px;"><button class="b-i" id="btn-R" style="background:var(--c1);">R</button><button class="b-i" id="btn-N" style="background:var(--c2);">N</button><button class="b-i" id="btn-0" style="background:var(--c3);">0</button></div>
            <div id="c-h" class="c-c"></div>
            <div style="display: flex; gap: 8px;"><button style="background:transparent; color:#555; border:1px solid #222; padding:12px; border-radius:10px; font-size:11px; flex:1;" id="btn-undo">CORREGIR</button><button style="background:transparent; color:#f1c40f; border:1px solid #f1c40f; padding:12px; border-radius:10px; font-size:11px; flex:1.2;" id="btn-trampa">⚠️ TRAMPA</button><button style="background:transparent; color:#e74c3c; border:1px solid #e74c3c; padding:12px; border-radius:10px; font-size:11px; flex:1;" id="btn-reset">REINICIAR</button></div>
        </div>
    </div>

    <script>
    (function(){
        const _uA = "https://script.google.com/macros/s/AKfycbx5WjIbvjm2EXQgGJhO3oJxYj0oMf_7A0DrwMrIli4N_d6oShqZv7ff_H8FN-pvWrHebg/exec";
        const _getH = () => { let k = localStorage.getItem('_ts_k_v2'); if(!k){ k='VIP-'+Math.random().toString(36).substring(2,12).toUpperCase(); localStorage.setItem('_ts_k_v2', k); } return k; };
        
        let _ba=0, _cI=0, _nG=0, _g=0, _p=0, _h=[], _m=0.2, _s="", _uL="", _uT="", _uS=0, _lS=null;

        // BLOQUEOS SAFARI
        document.addEventListener('touchstart',e=>{if(e.touches.length>1)e.preventDefault();},{passive:false});
        let _lTE=0; document.addEventListener('touchend',e=>{let n=Date.now();if(n-_lTE<=300)e.preventDefault();_lTE=n;},false);

        document.getElementById('btn-acepto').onclick=()=>{document.getElementById('btn-acepto').style.display='none';document.getElementById('step-1').style.display='block';};

        document.getElementById('btn-validar').onclick=async function(){
            _uL=document.getElementById('l-i').value.trim().toUpperCase(); if(!_uL) return;
            this.innerText="..."; _uT="W-"+Date.now();
            const r=await fetch(_uA+"?action=validar&serial="+_uL+"&hid="+_getH()+"&token="+_uT);
            const d=await r.json();
            if(d.status==="success"){
                _uS=d.segundos;
                if(d.estado_nube){ localStorage.setItem('ts_'+_uL, d.estado_nube); document.getElementById('btn-continuar-box').style.display='block'; }
                document.getElementById('step-1').style.display='none'; document.getElementById('step-2').style.display='block';
            }else{ document.getElementById('e-m').innerText=d.mensaje; this.innerText="VALIDAR LICENCIA"; }
        };

        document.getElementById('btn-entrar').onclick=()=>{ _ba=parseFloat(document.getElementById('c-init').value)||0; _cI=_ba; _arr(); };
        document.getElementById('btn-continuar-sesion').onclick=()=>{ const sv=localStorage.getItem('ts_'+_uL); if(sv){ const x=JSON.parse(sv); _ba=x.ba; _nG=x.nG||0; _cI=x.cI||x.ba; _h=x.h||[]; _m=x.m||0.2; } _arr(); };

        function _arr(){
            document.getElementById('p-l').style.display='none'; document.getElementById('app-principal').style.display='flex';
            setInterval(_fClock, 1000); setInterval(_fSave, 10000); _upd();
        }

        function _fR(c){
            _lS = JSON.parse(JSON.stringify({ba:_ba, nG:_nG, g:_g, p:_p, h:_h, m:_m, s:_s}));
            if(_s!==""){
                if(c.toUpperCase()===_s){ _ba+=_m; _nG+=_m; _m=0.2; _g++; }
                else if(c!=='Cero'){ _ba-=_m; _nG-=_m; _m*=2; _p++; }
            }
            _h.unshift(c); _s=(c==="Rojo")?"NEGRO":"ROJO"; _upd(); _fSave();
        }

        function _upd(){
            document.getElementById('cap-val').innerText="$"+_ba.toFixed(2);
            document.getElementById('n-g').innerText="$"+_nG.toFixed(2);
            document.getElementById('s-t').innerText=_s||"---";
            document.getElementById('s-t').style.color=(_s==="ROJO")?"#e74c3c":"#fff";
            document.getElementById('m-t').innerText="$"+_m.toFixed(2);
            const ch=document.getElementById('c-h'); ch.innerHTML="";
            _h.slice(0,24).forEach((v,idx)=>{
                const cl=(v==='Rojo')?'red':(v==='Negro'?'#fff':'green');
                const bd=(idx===0)?'border:2px solid var(--c5);':'';
                ch.innerHTML+=`<div class="bola" style="background:${cl}; color:${v==='Negro'?'#000':'#fff'}; ${bd}">${v==='Cero'?'0':''}</div>`;
            });
        }

        function _fSave(){
            if(!_uL) return;
            const est = JSON.stringify({ba:_ba, nG:_nG, cI:_cI, h:_h.slice(0,12), m:_m, s:_s});
            localStorage.setItem('ts_'+_uL, est);
            const url = _uA+"?action=guardar&licencia="+_uL+"&neto="+_nG.toFixed(2)+"&ganadas="+_g+"&perdidas="+_p+"&segundos_actuales="+_uS+"&estado="+encodeURIComponent(est);
            new Image().src = url;
        }

        function _fClock(){
            if(_uS>0){
                _uS--;
                let d=Math.floor(_uS/86400),h=Math.floor((_uS%86400)/3600),m=Math.floor((_uS%3600)/60),s=_uS%60;
                document.getElementById('tmr').innerText=_p2(d)+"d "+_p2(h)+"h "+_p2(m)+"m "+_p2(s)+"s";
            }
        }
        function _p2(n){return n<10?'0'+n:n;}

        document.getElementById('btn-R').onclick=()=>_fR('Rojo');
        document.getElementById('btn-N').onclick=()=>_fR('Negro');
        document.getElementById('btn-0').onclick=()=>_fR('Cero');
        document.getElementById('btn-undo').onclick=()=>{if(_lS){_ba=_lS.ba;_nG=_lS.nG;_h=_lS.h;_m=_lS.m;_s=_lS.s;_upd();}};
        document.getElementById('btn-reset').onclick=()=>{if(confirm("Reiniciar mesa?")){_h=[];_m=0.2;_upd();}};
        document.getElementById('btn-trampa').onclick=()=>{ alert("⚠️ Reportando patrón al sistema..."); new Image().src=_uA+"?action=reportar_fallo&licencia="+_uL; };
    })();
    </script>
</body>
</html>
