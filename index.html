
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TECNOENTRETE VIP v61.2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --c1: #e74c3c; --c2: #2c3e50; --c3: #27ae60; --c4: #f1c40f; --c5: #00e5ff; --c8: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none !important; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; position: fixed; font-family: 'Segoe UI', sans-serif; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://raw.githubusercontent.com/tecnoentretenciones-lang/tecno-vip-1/main/image_1209a3.jpg') no-repeat center center; background-size: cover; z-index: -2; }
        body::after { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: -1; }
        
        #p-l, #app-principal { width: 100%; height: 100dvh; max-width: 500px; display: flex; flex-direction: column; padding: 12px; padding-top: calc(env(safe-area-inset-top) + 45px); margin: auto; }
        #p-l { position: fixed; top: 0; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; }
        .c-l { background: rgba(20, 20, 20, 0.98); border: 2px solid var(--c5); border-radius: 25px; padding: 25px; width: 90%; text-align: center; }
        .legal-box { background: rgba(231, 76, 60, 0.2); border: 1px solid var(--c1); padding: 10px; border-radius: 12px; margin-bottom: 15px; font-size: 11px; color: #ff8888; font-weight: bold; }
        .i-s { width: 100%; background: #000; border: 2px solid #555; color: var(--c4); padding: 15px; border-radius: 12px; font-size: 20px; text-align: center; margin-bottom: 10px; outline: none; font-weight: bold; }
        .b-a { background: var(--c5); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 14px; margin-bottom: 10px; }
        
        #app-principal { display: none; gap: 8px; overflow-y: auto; }
        .tmr-big { background:#000; border:2px solid var(--c5); border-radius:15px; padding:10px; text-align:center; font-size: 28px; color: var(--c5); font-weight: 900; }
        .bola { width: 24px; height: 24px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }

        #modal-demo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #1a1a1a; border: 2px solid var(--c5); border-radius: 20px; padding: 25px; width: 100%; max-width: 400px; text-align: center; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="modal-demo">
        <div class="modal-content">
            <h2 style="color:var(--c5); margin-top:0;">🎁 PRUEBA GRATIS</h2>
            <p style="color:#eee; font-size:14px;">Registra tus datos para jugar 15 minutos gratis.</p>
            <input type="text" id="reg-nombre" class="i-s" placeholder="TU NOMBRE">
            <input type="number" id="reg-wsp" class="i-s" placeholder="WHATSAPP (569...)">
            <button class="b-a" id="btn-activar-demo">EMPEZAR DEMO</button>
            <button onclick="document.getElementById('modal-demo').style.display='none'" style="background:none; border:none; color:#888; text-decoration:underline;">Volver</button>
        </div>
    </div>

    <div id="p-l">
        <div class="c-l">
            <img src="https://cdn-icons-png.flaticon.com/512/1055/1055673.png" style="width:70px;">
            <h1 style="color:white; font-size:22px;">TECNOENTRETE VIP</h1>
            <div class="legal-box">⚠️ REGLAS: Iniciar con $0.20. Capital $40 USD.</div>
            
            <input type="text" id="l-i" class="i-s" placeholder="INGRESE LICENCIA" autocomplete="off">
            <button class="b-a" id="btn-validar">ENTRAR AL SISTEMA</button>
            <button class="b-a" style="background:rgba(255,255,255,0.1); color:var(--c5); border:1px solid var(--c5);" onclick="document.getElementById('modal-demo').style.display='flex'">PROBAR DEMO 15 MIN</button>
            <button class="b-a" style="background:#25d366; color:white;" onclick="window.open('https://wa.me/56995931641?text=Hola Felipe, quiero comprar un plan VIP. Los planes son: 12h: $8.000 | 24h: $15.000 | Semana: $50.000')"><i class="fab fa-whatsapp"></i> COMPRAR LICENCIA / PROMOS</button>
        </div>
    </div>

    <div id="app-principal">
        <div id="tmr" class="tmr-big">00d-00h:00m:00s</div>
        <div style="background:var(--c8); padding:15px; border-radius:15px; display:flex; flex-direction:column; gap:10px; flex-grow:1; border:1px solid #333;">
            <div style="background:#1a1a1a; padding:15px; border-radius:15px; text-align:center; border:1px solid #333;">
                <div id="s-t" style="font-size:75px; font-weight:900; line-height:1;">---</div>
                <div id="m-t" style="color:var(--c4); font-weight:900; font-size:24px; margin-top:5px;">$0.20</div>
            </div>
            <div style="display:flex; gap:8px;"><button class="b-i" id="btn-R" style="background:var(--c1); height:70px; border-radius:15px; border:none; font-size:30px; font-weight:bold; color:white; flex:1;">R</button><button class="b-i" id="btn-N" style="background:var(--c2); height:70px; border-radius:15px; border:none; font-size:30px; font-weight:bold; color:white; flex:1;">N</button><button class="b-i" id="btn-0" style="background:var(--c3); height:70px; border-radius:15px; border:none; font-size:30px; font-weight:bold; color:white; flex:1;">0</button></div>
            <div id="c-h" style="background:#000; height:90px; border-radius:12px; border:1px solid #222; padding:8px; display:flex; flex-wrap:wrap; justify-content:center; gap:5px; overflow-y:auto;"></div>
        </div>
    </div>

    <script>
    const _URL = "TU_URL_DE_APPS_SCRIPT_AQUI";

    let _L="", _S=0, _BA=0, _NG=0, _H=[], _M=0.2, _XS="", _PER=0, _NOM="", _WSP="", _TS=0, _IS=0;

    // VALIDACIÓN NORMAL
    document.getElementById('btn-validar').onclick = async function() {
        _L = document.getElementById('l-i').value.trim().toUpperCase();
        if(!_L) return;
        this.innerText = "...";
        const r = await fetch(_URL + "?action=validar&serial=" + _L + "&hid=" + navigator.userAgent.length);
        const d = await r.json();
        if(d.status === "success") {
            _S = d.segundos; _NG = d.neto_global;
            iniciarApp();
        } else { alert(d.mensaje); this.innerText = "ENTRAR"; }
    };

    // ACTIVACIÓN DEMO
    document.getElementById('btn-activar-demo').onclick = async function() {
        _NOM = document.getElementById('reg-nombre').value;
        _WSP = document.getElementById('reg-wsp').value;
        if(!_NOM || !_WSP) return alert("Completa los datos");
        _L = "DEMO"; _S = 900;
        iniciarApp();
    };

    function iniciarApp() {
        document.getElementById('p-l').style.display='none';
        document.getElementById('modal-demo').style.display='none';
        document.getElementById('app-principal').style.display='flex';
        _BA = parseFloat(prompt("SALDO EN MESA:", "40.00")) || 0;
        _TS = Date.now(); _IS = _S;
        setInterval(tick, 1000); setInterval(save, 20000);
        update();
    }

    function xfR(c) {
        if(_XS!==""){
            if(c.toUpperCase()===_XS){ _BA+=_M; _NG+=_M; _M=0.2; _PER=0; }
            else if(c!=='Cero'){ _BA-=_M; _NG-=_M; _M*=2; _PER++; }
        }
        _H.unshift(c); calc(); update();
    }

    function calc() {
        if(_H.length===0) return;
        let u=_H[0], p=_H[1]||"";
        if(u==='Cero'){ _XS=(p==='Rojo'?'ROJO':'NEGRO'); }
        else {
            let r=1; for(let i=0; i<_H.length-1; i++){ if(_H[i]===_H[i+1]) r++; else break; }
            if(r>=3) { _XS = u.toUpperCase(); } 
            else { _XS = (u==="Rojo"?"NEGRO":"ROJO"); }
        }
    }

    function tick() {
        let e = Math.floor((Date.now()-_TS)/1000); _S = Math.max(0, _IS - e);
        let d=Math.floor(_S/86400), h=Math.floor((_S%86400)/3600), m=Math.floor((_S%3600)/60), s=_S%60;
        document.getElementById('tmr').innerText = `${d}d-${h}h:${m}m:${s}s`;
        if(_S<=0) location.reload();
    }

    function update() {
        document.getElementById('s-t').innerText=_XS||"---";
        document.getElementById('s-t').style.color=(_XS==="ROJO")?"#e74c3c":"#fff";
        document.getElementById('m-t').innerText="$"+_M.toFixed(2);
        const ch=document.getElementById('c-h'); ch.innerHTML="";
        _H.slice(0,24).forEach(v => {
            const cl=(v==='Rojo')?'red':(v==='Negro'?'#fff':'green');
            ch.innerHTML+=`<div class="bola" style="background:${cl}; color:${v==='Negro'?'#000':'#fff'}">${v==='Cero'?'0':''}</div>`;
        });
    }

    function save() {
        new Image().src = _URL + `?action=guardar&serial=${_L}&neto=${_NG.toFixed(2)}&segundos_actuales=${_S}&nombre=${_NOM}&wsp=${_WSP}&hid=${navigator.userAgent.length}`;
    }

    document.getElementById('btn-R').onclick=()=>xfR('Rojo');
    document.getElementById('btn-N').onclick=()=>xfR('Negro');
    document.getElementById('btn-0').onclick=()=>xfR('Cero');
    </script>
</body>
</html>
