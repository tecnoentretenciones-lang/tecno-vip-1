<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TECNOENTRETE PREDICTOR ONLINE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --c1: #e74c3c; --c2: #2c3e50; --c3: #27ae60; --c4: #f1c40f; --c5: #00e5ff; --c8: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none !important; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; background-color: #000; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }

        /* Estilo para Computadora (Gigante) */
        #app-container { 
            display: flex; flex-direction: column; height: 100dvh; width: 100%; 
            max-width: 1200px; margin: auto; padding: 20px; gap: 15px; 
        }

        /* Selector de Moneda */
        .currency-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 5px; }
        .nav-btn { 
            padding: 10px 25px; border-radius: 10px; border: 1px solid #444; 
            background: #222; color: #888; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .nav-btn.active { background: var(--c5); color: #000; border-color: var(--c5); box-shadow: 0 0 15px rgba(0,229,255,0.4); }

        /* Panel Superior */
        .wallet-panel { 
            background: #0a0a0a; border: 2px solid #333; border-radius: 20px; 
            padding: 25px; display: flex; justify-content: space-around; 
        }
        .w-item { text-align: center; }
        .w-label { font-size: 14px; color: #888; margin-bottom: 5px; font-weight: bold; }
        .w-value { font-size: 32px; font-weight: 900; }

        /* Sugerencia Central */
        .display-central { 
            flex-grow: 1; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; background: #111; border: 4px solid var(--c5); 
            border-radius: 30px; margin: 10px 0; box-shadow: inset 0 0 30px rgba(0,229,255,0.1);
        }
        #s-text { font-size: 160px; font-weight: 900; line-height: 1; margin: 0; }
        #m-text { font-size: 50px; color: var(--c4); font-weight: bold; margin-top: 10px; }

        /* Botones de Entrada */
        .input-grid { display: flex; gap: 15px; height: 120px; }
        .btn-color { 
            flex: 1; border: none; border-radius: 20px; font-size: 50px; 
            color: white; font-weight: bold; cursor: pointer; transition: 0.1s; 
        }
        .btn-color:active { transform: scale(0.95); }

        /* Historial y Acciones */
        #history-bar { 
            height: 70px; background: #050505; border-radius: 15px; border: 1px solid #222; 
            display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px; overflow: hidden;
        }
        .bola { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; border: 1px solid rgba(255,255,255,0.2); }

        .actions-grid { display: flex; gap: 15px; }
        .btn-action { 
            flex: 1; padding: 20px; border-radius: 15px; border: 1px solid #444; 
            background: transparent; color: white; font-weight: bold; font-size: 18px; cursor: pointer; 
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="app-container">
        <div class="currency-nav">
            <button class="nav-btn active" id="mode-usd" onclick="setCurrency('USD')">USD $</button>
            <button class="nav-btn" id="mode-clp" onclick="setCurrency('CLP')">CLP $</button>
        </div>

        <div class="wallet-panel">
            <div class="w-item"><div class="w-label">APUESTA</div><div id="val-apuesta" class="w-value" style="color:var(--c4);">$0.00</div></div>
            <div class="w-item"><div class="w-label">UTILIDAD</div><div id="val-utilidad" class="w-value" style="color:var(--c3);">$0.00</div></div>
        </div>

        <div class="display-central">
            <p id="s-text">---</p>
            <p id="m-text">$0.20</p>
        </div>

        <div class="input-grid">
            <button class="btn-color" style="background:var(--c1);" onclick="registrar('Rojo')">R</button>
            <button class="btn-color" style="background:var(--c2);" onclick="registrar('Negro')">N</button>
            <button class="btn-color" style="background:var(--c3);" onclick="registrar('Cero')">0</button>
        </div>

        <div id="history-bar"></div>

        <div class="actions-grid">
            <button class="btn-action" style="color:#aaa;" onclick="deshacer()">
                <i class="fas fa-undo"></i> DESHACER
            </button>
            <button class="btn-action" style="color:var(--c1); border-color:var(--c1);" onclick="resetear()">
                <i class="fas fa-trash"></i> RESET
            </button>
        </div>
    </div>

    <script>
        let _h = []; // Historial
        let _m = 0.20; // Monto actual
        let _s = ""; // Sugerencia actual
        let _ut = 0; // Utilidad total
        let _cur = "USD"; // Moneda actual
        let _lS = null; // Backup para UNDO

        // Función para cambiar moneda
        function setCurrency(type) {
            _cur = type;
            document.getElementById('mode-usd').classList.toggle('active', type === 'USD');
            document.getElementById('mode-clp').classList.toggle('active', type === 'CLP');
            resetear(); // Resetea para aplicar valores base
        }

        // MOTOR ORIGINAL (Se mantiene en la ola)
        function motorOriginal(h) {
            if (h.length === 0) return "---";
            let u = h[0]; // Último
            let p = h[1]; // Penúltimo
            
            // Contador de racha
            let r = 1;
            for (let k = 0; k < h.length - 1; k++) {
                if (h[k] === h[k + 1]) r++;
                else break;
            }

            let proxima = (u === "Rojo") ? "NEGRO" : "ROJO";
            if (u === 'Cero') proxima = (p === 'Rojo') ? "ROJO" : "NEGRO";
            
            // Lógica de Ola: Si hay racha de 3 o más, sigue el color
            if (r >= 3) proxima = u.toUpperCase();
            
            return proxima;
        }

        function registrar(color) {
            // Guardar estado para UNDO
            _lS = { h: [..._h], m: _m, s: _s, ut: _ut };

            let base = (_cur === "USD") ? 0.20 : 200;

            if (_s !== "") {
                if (color.toUpperCase() === _s) {
                    // Ganó
                    _ut += _m;
                    _m = base;
                } else if (color !== 'Cero') {
                    // Perdió (No cuenta el 0 para duplicar en esta versión)
                    _ut -= _m;
                    _m *= 2;
                }
            }

            _h.unshift(color);
            _s = motorOriginal(_h);
            update();
        }

        function deshacer() {
            if (_lS) {
                _h = [..._lS.h];
                _m = _lS.m;
                _s = _lS.s;
                _ut = _lS.ut;
                _lS = null;
                update();
            }
        }

        function resetear() {
            if (confirm("¿Reiniciar sesión?")) {
                _h = [];
                _m = (_cur === "USD") ? 0.20 : 200;
                _s = "";
                _ut = 0;
                _lS = null;
                update();
            }
        }

        function update() {
            let pref = (_cur === "USD") ? "$" : "";
            let suff = (_cur === "CLP") ? " CLP" : "";
            
            // Textos centrales
            document.getElementById('s-text').innerText = _s || "---";
            document.getElementById('s-text').style.color = (_s === "ROJO") ? "#e74c3c" : (_s === "NEGRO" ? "#fff" : "#888");
            document.getElementById('m-text').innerText = pref + _m.toLocaleString() + suff;

            // Billetera
            document.getElementById('val-apuesta').innerText = pref + _m.toLocaleString() + suff;
            document.getElementById('val-utilidad').innerText = pref + _ut.toLocaleString() + suff;
            document.getElementById('val-utilidad').style.color = (_ut >= 0) ? "var(--c3)" : "var(--c1)";

            // Historial visual
            const hBar = document.getElementById('history-bar');
            hBar.innerHTML = "";
            _h.slice(0, 15).forEach(v => {
                let bg = (v === 'Rojo') ? 'red' : (v === 'Negro' ? '#fff' : 'green');
                let tc = (v === 'Negro') ? '#000' : '#fff';
                hBar.innerHTML += `<div class="bola" style="background:${bg}; color:${tc}">${v[0]}</div>`;
            });
        }

        // Bloqueos de seguridad para Online
        document.addEventListener('keydown', function(e) {
            if(e.key === "F12" || (e.ctrlKey && e.shiftKey && e.key === "I") || (e.ctrlKey && e.key === "u")) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
