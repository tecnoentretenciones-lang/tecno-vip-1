<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TECNOENTRETE VIP - MESA SEGURA CLOUD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --c1: #e74c3c; --c2: #2c3e50; --c3: #27ae60; --c4: #f1c40f; --c5: #00e5ff; --c8: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none !important; user-select: none !important; -webkit-user-drag: none; overscroll-behavior: none; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden !important; background-color: #000; position: fixed; font-family: 'Segoe UI', sans-serif; }
        @keyframes rotar { 100% { transform: rotate(360deg); } }
        #p-l { width: 100%; height: 100dvh; max-width: 450px; display: flex; flex-direction: column; padding: 20px; margin: auto; position: fixed; top: 0; left: 50%; transform: translateX(-50%); background: #000; z-index: 9999; justify-content: center; align-items: center; }
        .c-l { background: #000; border: 2px solid #00e5ff; border-radius: 20px; padding: 25px 20px; width: 100%; text-align: center; box-shadow: 0 0 20px rgba(0,229,255,0.3); }
        .c-l img { width: 80px; margin-bottom: 10px; border-radius: 50%; border: 2px solid #fff; animation: rotar 5s linear infinite;}
        .c-l h1 { color: #fff; font-size: 22px; margin: 0 0 15px 0; font-weight: 900;}
        .box-global { background: linear-gradient(180deg, #f39c12, #e67e22); color: #000; padding: 12px; border-radius: 10px; margin-bottom: 15px; font-weight: 900; font-size: 18px; display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(243,156,18,0.4); }
        .box-global-title { font-size: 11px; text-transform: uppercase; color: #111; margin-bottom: 2px; }
        .legal-box { background: rgba(231, 76, 60, 0.1); border: 1px solid #e74c3c; padding: 15px; border-radius: 10px; margin-bottom: 15px; font-size: 11px; color: #e74c3c; text-align: left; line-height: 1.5; font-weight: 600;}
        .i-s { width: 100%; background: #000; border: 1px solid #444; color: #f1c40f; padding: 15px; border-radius: 10px; font-size: 18px; text-align: center; margin-bottom: 15px; outline: none; font-weight: bold; }
        .b-a { border: none; padding: 18px; border-radius: 10px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 14px; margin-bottom: 10px; transition: transform 0.1s;}
        .b-a:active { transform: scale(0.97); }
        .btn-entrar { background: #00e5ff; color: #000; }
        .btn-demo { background: #0b2228; color: #00e5ff; border: 2px solid #00e5ff; }
        .btn-planes { background: #00e5ff; color: #000; }
        .btn-manual { background: #f1c40f; color: #000; }
        #app-principal { display: none; flex-direction: column; width: 100%; height: 100dvh; max-width: 500px; padding: calc(env(safe-area-inset-top) + 10px) 10px 10px 10px; margin: auto; }
        .tmr-big { background:#000; border:2px solid var(--c5); border-radius: 12px; padding:10px; text-align:center; font-size: 26px; color: var(--c5); font-weight: 900; margin-bottom: 5px;}
        #global-wallet { background:#000; border:1px solid #333; border-radius:15px; padding:12px; display:flex; justify-content:space-around; margin-bottom: 5px; }
        .gw-box { text-align:center; }
        .gw-title { font-size:11px; color:#888; }
        .gw-val { font-size:18px; font-weight:bold; }
        .bola { width: 22px; height: 22px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 9px; font-weight: bold; }
        #stats-bar { background:#0a0a0a; border:1px solid #333; border-radius:10px; padding:6px 10px; display:flex; justify-content:space-between; font-size:11px; font-weight:bold; color:#aaa; margin-top:-2px; }
        .modal-base { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: rgba(20, 20, 20, 0.98); border: 2px solid var(--c5); border-radius: 25px; padding: 25px; width: 90%; text-align: center; max-width: 450px; }
        .manual-text { text-align: left; font-size: 13px; line-height: 1.5; color: #fff; background: rgba(0,0,0,0.5); border: 1px solid #333; padding: 15px; border-radius: 12px; max-height: 350px; overflow-y: auto; margin-bottom: 15px; }
        #toast-evasion { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #27ae60, #2ecc71); color: #fff; padding: 15px 20px; border-radius: 10px; font-weight: 900; font-size: 14px; box-shadow: 0 5px 15px rgba(39, 174, 96, 0.6); z-index: 10007; display: none; text-align: center; border: 2px solid #fff; width: 90%; max-width: 400px; }
        @keyframes pulse-text { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .loading-st { animation: pulse-text 1s infinite; color: #888 !important; }
        @keyframes glow-pulse { 0% { box-shadow: 0 0 10px var(--c5); } 50% { box-shadow: 0 0 25px var(--c5); } 100% { box-shadow: 0 0 10px var(--c5); } }
        #sugerencia-container { border: 2px solid var(--c5); animation: glow-pulse 3s infinite linear; background: #1a1a1a; padding: 15px; border-radius: 15px; text-align: center; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="toast-evasion">🛡️ ¡SISTEMA VIP EVADIÓ UNA TRAMPA DEL CASINO!</div>

    <div id="p-l">
        <div class="c-l">
            <img src="https://cdn-icons-png.flaticon.com/512/1055/1055673.png" alt="logo"> 
            <h1>TECNOENTRETE VIP</h1>
            <div class="box-global">
                <span class="box-global-title">🏆 COMUNIDAD VIP GANANDO:</span>
                <span id="lbl-global-neto">Cargando...</span>
            </div>
            <div class="legal-box">REGLAS DE ORO: Iniciar base $0.20. Capital recomendado $40 USD.</div>
            <input type="text" id="u-i" class="i-s" placeholder="USUARIO VIP">
            <input type="password" id="l-i" class="i-s" placeholder="CLAVE / LICENCIA">
            <button class="b-a btn-entrar" id="btn-validar">ENTRAR AL SISTEMA</button>
            <button class="b-a btn-demo" onclick="document.getElementById('modal-demo').style.display='flex'">PROBAR DEMO GRATIS</button>
        </div>
    </div>

    <div id="app-principal">
        <div id="tmr" class="tmr-big">00d-00h:00m:00s</div>
        <div id="global-wallet">
            <div class="gw-box"><div class="gw-title">CAPITAL</div><div id="c-i" class="gw-val">$0.00</div></div>
            <div class="gw-box"><div class="gw-title">UTILIDAD</div><div id="u-s" class="gw-val">$0.00</div></div>
            <div class="gw-box"><div class="gw-title">GLOBAL</div><div id="n-g" class="gw-val">$0.00</div></div>
        </div>
        <div style="background:var(--c8); padding:15px; border-radius:15px; flex-grow:1; display:flex; flex-direction:column; gap:10px;">
            <div id="sugerencia-container">
                <div id="s-t" style="font-size:70px; font-weight:900;">---</div>
                <div id="m-t" style="color:var(--c4); font-size:24px;">$0.20</div>
            </div>
            <div style="display:flex; gap:8px;">
                <button onclick="xfR('Rojo')" style="background:var(--c1); height:60px; flex:1; border-radius:10px; border:none; color:#fff; font-weight:bold; font-size:20px;">R</button>
                <button onclick="xfR('Negro')" style="background:var(--c2); height:60px; flex:1; border-radius:10px; border:none; color:#fff; font-weight:bold; font-size:20px;">N</button>
                <button onclick="xfR('Cero')" style="background:var(--c3); height:60px; flex:1; border-radius:10px; border:none; color:#fff; font-weight:bold; font-size:20px;">0</button>
            </div>
            <div id="c-h" style="display:flex; flex-wrap:wrap; gap:5px; justify-content:center; background:#000; padding:10px; border-radius:10px; min-height:50px;"></div>
        </div>
    </div>

    <div id="modal-demo" class="modal-base">
        <div class="modal-content">
            <h2 style="color:var(--c5)">🎁 DEMO GRATIS</h2>
            <input type="text" id="reg-nombre" class="i-s" placeholder="Nombre y Apellido">
            <input type="tel" id="reg-wsp" class="i-s" placeholder="WhatsApp (Ej: 56912345678)">
            <button class="b-a btn-entrar" id="btn-activar-demo" onclick="solicitarDemo()">ACTIVAR AHORA</button>
            <button onclick="document.getElementById('modal-demo').style.display='none'" style="background:none; border:none; color:#888; text-decoration:underline;">Cerrar</button>
        </div>
    </div>

    <script>
    const _URL = "https://script.google.com/macros/s/AKfycbVAoiVPr4M2x3qZjW2jEL9yn633Rc7FqcXZaSMzIf6uant1VbLPV7ScwSudHslJYOuzw/exec";
    let _HID = localStorage.getItem('VIP_HID') || 'VIP-'+Math.random().toString(36).substr(2,10).toUpperCase(); localStorage.setItem('VIP_HID', _HID);
    let _L="", _U="", _S=0, _ba=40, _nP=0, _nG=0, _h=[], _m=0.2, _s="", _TS=0, _IS=0, _isFetching=false;

    async function solicitarDemo() {
        const nom = document.getElementById('reg-nombre').value.trim();
        const wsp = document.getElementById('reg-wsp').value.trim();
        if(!nom || !wsp) return alert("Completa los datos");
        document.getElementById('btn-activar-demo').innerText = "PROCESANDO...";
        try {
            const r = await fetch(_URL + "?action=solicitar_demo&nombre="+encodeURIComponent(nom)+"&wsp="+wsp+"&hid="+_HID);
            const d = await r.json();
            if(d.status === "success") {
                alert("✅ SOLICITUD ENVIADA. Responde 'SI' al WhatsApp. Entrarás automáticamente al detectar la activación.");
                document.getElementById('modal-demo').style.display='none';
                document.getElementById('u-i').value = "DEMO";
                document.getElementById('l-i').value = d.serial;
                let btnE = document.getElementById('btn-validar');
                btnE.innerText = "⏳ ESPERANDO WSP...";
                btnE.style.background = "#f1c40f";
                let check = setInterval(async () => {
                    const rx = await fetch(_URL + "?action=validar&serial=" + d.serial);
                    const dx = await rx.json();
                    if(dx.status === "success") { clearInterval(check); btnE.click(); }
                }, 4000);
            }
        } catch(e){ alert("Error de red"); }
    }

    document.getElementById('btn-validar').onclick = async function() {
        _U = document.getElementById('u-i').value.trim(); _L = document.getElementById('l-i').value.trim().toUpperCase();
        if(!_U || !_L) return alert("Faltan datos");
        this.innerText = "... CONECTANDO ...";
        try {
            const r = await fetch(_URL + "?action=validar&usuario=" + encodeURIComponent(_U) + "&serial=" + encodeURIComponent(_L) + "&hid=" + _HID);
            const d = await r.json();
            if(d.status === "success") { _S = d.segundos; iniciarApp(); } else { alert(d.mensaje); this.innerText = "ENTRAR AL SISTEMA"; }
        } catch(e) { alert("Error de conexión"); this.innerText = "ENTRAR AL SISTEMA"; }
    };

    function iniciarApp() { 
        document.getElementById('p-l').style.display='none'; 
        document.getElementById('app-principal').style.display='flex'; 
        _TS = Date.now(); _IS = _S; 
        setInterval(() => {
            let e = Math.floor((Date.now()-_TS)/1000); _S = Math.max(0, _IS - e);
            let d=Math.floor(_S/86400), h=Math.floor((_S%86400)/3600), m=Math.floor((_S%3600)/60), s=_S%60;
            document.getElementById('tmr').innerText = `${d}d-${h}h:${m}m:${s}s`;
            if(_S<=0) location.reload();
        }, 1000);
        update();
    }

    async function xfR(c) {
        if(_isFetching) return; _isFetching = true;
        if(_s !== "" && _s !== "⏳") {
            if(c.toUpperCase() === _s){ _ba += _m; _nP += _m; _m = 0.2; } else if(c !== 'Cero'){ _ba -= _m; _nP -= _m; _m *= 2; }
        }
        _h.unshift(c);
        let stDiv = document.getElementById('s-t'); stDiv.innerText = "⏳";
        try {
            const res = await fetch(_URL + "?action=calcular&historial=" + encodeURIComponent(JSON.stringify(_h.slice(0, 10))));
            const data = await res.json(); _s = data.sugerencia;
        } catch(e){ _s = "ERROR"; }
        _isFetching = false; update();
    }

    function update() {
        document.getElementById('c-i').innerText="$"+_ba.toFixed(2);
        document.getElementById('u-s').innerText="$"+_nP.toFixed(2);
        document.getElementById('s-t').innerText=_s||"---";
        document.getElementById('s-t').style.color=(_s==="ROJO")?"#e74c3c":(_s==="NEGRO"?"#fff":"#888");
        document.getElementById('m-t').innerText="$"+_m.toFixed(2);
        const ch=document.getElementById('c-h'); ch.innerHTML="";
        _h.slice(0,12).forEach(v => {
            const cl=(v==='Rojo')?'red':(v==='Negro'?'#fff':'green');
            ch.innerHTML+=`<div class="bola" style="background:${cl}; border:1px solid #444; width:25px; height:25px; border-radius:50%"></div>`;
        });
    }
    </script>
</body>
</html>
