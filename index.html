<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TECNOENTRETE VIP - MESA SEGURA CLOUD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --c1: #e74c3c; --c2: #2c3e50; --c3: #27ae60; --c4: #f1c40f; --c5: #00e5ff; --c8: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100%; background-color: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; }
        
        /* INICIO / LOGIN */
        #p-l { width: 100%; height: 100dvh; max-width: 500px; display: flex; flex-direction: column; padding: 20px; margin: auto; position: fixed; top: 0; left: 50%; transform: translateX(-50%); background: #000; z-index: 9999; justify-content: center; align-items: center; overflow-y: auto; }
        .c-l { background: #000; border: 2px solid #00e5ff; border-radius: 20px; padding: 25px; width: 100%; text-align: center; box-shadow: 0 0 20px rgba(0,229,255,0.3); }
        .c-l img { width: 80px; margin-bottom: 10px; border-radius: 50%; animation: rotar 5s linear infinite; border: 2px solid #fff;}
        @keyframes rotar { 100% { transform: rotate(360deg); } }
        
        .box-global { background: linear-gradient(180deg, #f39c12, #e67e22); color: #000; padding: 10px; border-radius: 10px; margin-bottom: 10px; font-weight: 900; font-size: 18px; display: flex; flex-direction: column; }
        .legal-box { background: rgba(231, 76, 60, 0.1); border: 1px solid #e74c3c; padding: 12px; border-radius: 10px; margin-bottom: 10px; font-size: 11px; color: #e74c3c; text-align: left; line-height: 1.3; }
        
        .i-s { width: 100%; background: #000; border: 1px solid #444; color: #f1c40f; padding: 15px; border-radius: 10px; font-size: 18px; text-align: center; margin-bottom: 10px; outline: none; font-weight: bold; }
        .b-a { border: none; padding: 16px; border-radius: 12px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 14px; margin-bottom: 8px; }

        /* JUEGO */
        #app-principal { display: none; flex-direction: column; width: 100%; height: 100dvh; max-width: 500px; padding: 10px; margin: auto; justify-content: space-between; }
        .tmr-big { background:#000; border:2px solid var(--c5); border-radius: 12px; padding:10px; text-align:center; font-size: 24px; color: var(--c5); font-weight: 900; }
        
        #global-wallet { background:#000; border:1px solid #333; border-radius:15px; padding:12px; display:flex; justify-content:space-around; }
        .gw-box { text-align:center; } .gw-val { font-size:20px; font-weight:bold; }
        
        #sugerencia-container { border: 3px solid var(--c5); background: #111; padding: 20px; border-radius: 20px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; margin: 10px 0; }
        #s-t { font-size: 80px; font-weight: 900; line-height: 1; }
        #m-t { color:var(--c4); font-size:35px; margin-top: 5px; }

        .b-i { height: 85px; border-radius: 18px; border:none; font-size: 45px; color: white; flex: 1; font-weight: bold; cursor: pointer; }
        .bola { width: 35px; height: 35px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; border: 1px solid #222; }
        #c-h { background:#000; height: 60px; border-radius: 12px; border: 1px solid #222; display: flex; align-items: center; justify-content: center; gap: 6px; overflow: hidden; }

        #stats-bar { background:#0a0a0a; border:1px solid #333; border-radius:10px; padding:10px; display:flex; justify-content:space-between; font-size:16px; font-weight:bold; color:#aaa; }
        .actions-grid { display:flex; gap:10px; }
        .btn-footer { background:transparent; border:1px solid #444; color:white; padding: 15px; border-radius: 12px; font-size: 13px; font-weight: bold; flex: 1; cursor: pointer; }
    </style>
</head>
<body>

    <div id="p-l">
        <div class="c-l">
            <img src="https://cdn-icons-png.flaticon.com/512/1055/1055673.png"> 
            <h1>TECNOENTRETE VIP</h1>
            
            <div class="box-global">
                <span style="font-size: 11px; color: #111;">🏆 COMUNIDAD GANANDO:</span>
                <span id="lbl-global-neto">$ 0.00 USD</span>
            </div>

            <div class="legal-box">
                <b>REGLAS DE ORO:</b><br>
                - Iniciar con monto base <b>$0.20</b>.<br>
                - Capital recomendado: <b>$40 USD</b>.<br>
                - Moneda actual seleccionada: <b id="lbl-moneda">USD</b>
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 12px;">
                <button onclick="cambiarMoneda('USD')" id="m-usd" style="flex:1; padding:8px; border-radius:8px; background:var(--c5); color:black; font-weight:bold; border:none;">USD</button>
                <button onclick="cambiarMoneda('CLP')" id="m-clp" style="flex:1; padding:8px; border-radius:8px; background:#222; color:white; border:none;">CLP</button>
            </div>

            <input type="text" id="u-i" class="i-s" placeholder="USUARIO VIP">
            <input type="password" id="l-i" class="i-s" placeholder="CLAVE / LICENCIA">
            
            <button class="b-a" style="background:#00e5ff; color:#000;" id="btn-validar">ENTRAR AL SISTEMA</button>
            <button class="b-a" style="background:#0b2228; color:#00e5ff; border:1px solid #00e5ff;" onclick="alert('Contacte soporte para Demo')">SOLICITAR DEMO</button>
        </div>
    </div>

    <div id="app-principal">
        <div id="tmr" class="tmr-big">00d-00h:00m:00s</div>

        <div id="global-wallet">
            <div class="gw-box"><div style="color:#888; font-size:11px;">APUESTA</div><div id="c-i" class="gw-val" style="color:#fff;">$0.00</div></div>
            <div class="gw-box"><div style="color:#888; font-size:11px;">UTILIDAD</div><div id="u-s" class="gw-val" style="color:var(--c3);">$0.00</div></div>
            <div class="gw-box"><div style="color:#888; font-size:11px;">GLOBAL</div><div id="n-g" class="gw-val" style="color:var(--c5);">$0.00</div></div>
        </div>

        <div id="sugerencia-container">
            <div id="s-t">---</div>
            <div id="m-t">$0.20</div>
        </div>

        <div style="display:flex; gap:10px;">
            <button class="b-i" style="background:var(--c1);" onclick="xfR('Rojo')">R</button>
            <button class="b-i" style="background:var(--c2);" onclick="xfR('Negro')">N</button>
            <button class="b-i" style="background:var(--c3);" onclick="xfR('Cero')">0</button>
        </div>

        <div id="c-h"></div>

        <div id="stats-bar">
            <div>R: <span id="st-R">0</span></div>
            <div>N: <span id="st-N">0</span></div>
            <div>0: <span id="st-0">0</span></div>
        </div>

        <div class="actions-grid">
            <button class="btn-footer" onclick="deshacer()">CORREGIR</button>
            <button id="btn-t" class="btn-footer" style="color:var(--c4); opacity:0.3; pointer-events:none;" onclick="reportarTrampa()">⚠️ TRAMPA</button>
            <button class="btn-footer" style="color:var(--c1);" onclick="resetear()">RESET</button>
        </div>
    </div>

    <script>
        const _URL = "https://script.google.com/macros/s/AKfycbzUIdq4jKKOi3_fu3kLsO_cP3Z9ckXp7B6sUiP78B7Km7bDVmaecAIdsWGgGcA8nlE8JA/exec";
        let _U="", _L="", _S=0, _h=[], _m=0.2, _s="", _nP=0, _nG=0, _cR=0, _cN=0, _c0=0, _per=0;
        let _lS = null; // BACKUP PARA CORREGIR (UNDO)
        let _MONEDA = "USD";
        let _TS=0, _IS=0;
        window.trampasLocales = [];

        function cambiarMoneda(m) {
            _MONEDA = m;
            document.getElementById('lbl-moneda').innerText = m;
            document.getElementById('m-usd').style.background = m === 'USD' ? 'var(--c5)' : '#222';
            document.getElementById('m-clp').style.background = m === 'CLP' ? 'var(--c5)' : '#222';
            _m = (m === "USD") ? 0.20 : 200;
            update();
        }

        // CARGA GLOBAL
        window.onload = async () => {
            try {
                const r = await fetch(_URL + "?action=obtener_global");
                const d = await r.json();
                if(d.status === "success") document.getElementById('lbl-global-neto').innerText = "$ " + d.total_global + " USD";
            } catch(e){}
        };

        // LOGIN Y TIEMPO
        document.getElementById('btn-validar').onclick = async function() {
            _U = document.getElementById('u-i').value.trim();
            _L = document.getElementById('l-i').value.trim().toUpperCase();
            if(!_U || !_L) return;
            this.innerText = "⏳ CONECTANDO...";
            
            try {
                const r = await fetch(_URL + "?action=validar&usuario="+encodeURIComponent(_U)+"&serial="+encodeURIComponent(_L));
                const d = await r.json();
                if(d.status === "success") {
                    _S = d.segundos;
                    _nG = parseFloat(d.neto_global) || 0;
                    
                    // Bajar trampas
                    let rT = await fetch(_URL + "?action=panel_trampas");
                    let dT = await rT.json();
                    if(dT.datos) dT.datos.forEach(row => { if(row[2]) window.trampasLocales.push(row[2].split("_")[0]); });

                    document.getElementById('p-l').style.display='none';
                    document.getElementById('app-principal').style.display='flex';
                    
                    // Iniciar Reloj
                    _TS = Date.now(); _IS = _S;
                    setInterval(TM_TICK, 1000);
                    update();
                } else { alert(d.mensaje); this.innerText="ENTRAR"; }
            } catch(e){ alert("Error de red"); this.innerText="ENTRAR"; }
        };

        function TM_TICK() {
            let e = Math.floor((Date.now() - _TS) / 1000);
            _S = Math.max(0, _IS - e);
            let d=Math.floor(_S/86400), h=Math.floor((_S%86400)/3600), m=Math.floor((_S%3600)/60), s=_S%60;
            document.getElementById('tmr').innerText = `${d}d-${h}h:${m}m:${s}s`;
            if(_S <= 0 && _IS > 0) location.reload();
        }

        function xfR(c) {
            // GUARDAR ESTADO PARA BOTÓN CORREGIR (UNDO)
            _lS = JSON.parse(JSON.stringify({h:_h, m:_m, s:_s, nP:_nP, nG:_nG, cR:_cR, cN:_cN, c0:_c0, per:_per}));

            if(c==='Rojo')_cR++; else if(c==='Negro')_cN++; else if(c==='Cero')_c0++;
            
            if(_s !== "") {
                if(c.toUpperCase() === _s) { // Ganó
                    _nP += _m; _nG += _m;
                    _m = (_MONEDA==="USD") ? 0.20 : 200;
                    _per = 0;
                } else if(c !== 'Cero') { // Perdió
                    _nP -= _m; _nG -= _m;
                    _m *= 2;
                    _per++;
                }
            }
            _h.unshift(c);
            _s = motorCalculo(_h);
            if(_per >= 7) { document.getElementById('btn-t').style.opacity="1"; document.getElementById('btn-t').style.pointerEvents="auto"; }
            update();
        }

        function motorCalculo(h) {
            if(!h.length) return "---";
            let r=1; for(let k=0; k<h.length-1; k++){ if(h[k]===h[k+1]) r++; else break; }
            let sn = (h[0]==="Rojo")?"NEGRO":"ROJO";
            if(h[0]==='Cero') sn=(h[1]==='Rojo')?'ROJO':'NEGRO';
            if(r>=3) sn=h[0].toUpperCase();
            
            // Trampas
            let nc = sn==="ROJO"?"R":"N", hh = [nc, ...h.slice(0,10).map(v=>v[0].toUpperCase())].join("-");
            for(let tr of window.trampasLocales) if(hh.indexOf(tr)===0) { sn=(sn==="ROJO")?"NEGRO":"ROJO"; break; }
            return sn;
        }

        function deshacer() {
            if(_lS) {
                _h = _lS.h; _m = _lS.m; _s = _lS.s; _nP = _lS.nP; _nG = _lS.nG;
                _cR = _lS.cR; _cN = _lS.cN; _c0 = _lS.c0; _per = _lS.per;
                _lS = null; update();
            }
        }

        function resetear() { if(confirm("¿Reset?")) { _h=[]; _m=(_MONEDA==="USD")?0.20:200; _s=""; _nP=0; _cR=0; _cN=0; _c0=0; update(); } }

        function update() {
            let p = _MONEDA === "USD" ? "$" : "";
            document.getElementById('c-i').innerText = p + _m.toLocaleString();
            document.getElementById('u-s').innerText = p + _nP.toLocaleString();
            document.getElementById('n-g').innerText = p + _nG.toLocaleString();
            document.getElementById('s-t').innerText = _s || "---";
            document.getElementById('s-t').style.color = _s === "ROJO" ? "#e74c3c" : (_s === "NEGRO" ? "#fff" : "#888");
            document.getElementById('m-t').innerText = p + _m.toLocaleString();
            document.getElementById('st-R').innerText = _cR;
            document.getElementById('st-N').innerText = _cN;
            document.getElementById('st-0').innerText = _c0;
            const ch = document.getElementById('c-h'); ch.innerHTML = "";
            _h.slice(0, 12).forEach(v => {
                let bg = v === 'Rojo' ? 'red' : (v === 'Negro' ? '#fff' : 'green');
                ch.innerHTML += `<div class="bola" style="background:${bg}; color:${v==='Negro'?'#000':'#fff'}">${v[0]}</div>`;
            });
        }
    </script>
</body>
</html>
