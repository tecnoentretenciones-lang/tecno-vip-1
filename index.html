<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TECNOENTRETE VIP</title>
    </head>
<body>
    <script>
    const _URL = "https://script.google.com/macros/s/AKfycbzVAoiVPr4M2x3qZjW2jEL9yn633Rc7FqcXZaSMzIf6uant1VbLPV7ScwSudHslJYOuzw/exec";
    let _HID = localStorage.getItem('VIP_HID') || 'VIP-'+Math.random().toString(36).substr(2,10).toUpperCase(); localStorage.setItem('VIP_HID', _HID);

    async function solicitarDemo() {
        const nom = document.getElementById('reg-nombre').value;
        const rawWsp = document.getElementById('reg-wsp').value;
        if(!nom || !rawWsp) return alert("Completa los datos");
        
        const btnActivar = document.getElementById('btn-activar-demo');
        btnActivar.innerText = "PROCESANDO...";

        try {
            const r = await fetch(_URL + "?action=solicitar_demo&nombre="+encodeURIComponent(nom)+"&wsp="+rawWsp+"&hid="+_HID);
            const d = await r.json();
            if(d.status === "success") {
                alert("✅ SOLICITUD ENVIADA. Responde 'SI' al WhatsApp. ¡La página entrará sola apenas contestes!");
                document.getElementById('modal-demo').style.display='none';
                document.getElementById('u-i').value = "DEMO";
                document.getElementById('l-i').value = d.serial;
                
                let btnEntrar = document.getElementById('btn-validar');
                btnEntrar.innerText = "⏳ ESPERANDO WSP...";
                btnEntrar.style.background = "#f1c40f";

                // ESCUCHADOR AUTOMÁTICO
                let check = setInterval(async () => {
                    let rx = await fetch(_URL + "?action=validar&serial=" + d.serial);
                    let dx = await rx.json();
                    if(dx.status === "success") {
                        clearInterval(check);
                        btnEntrar.click(); // ENTRA AUTOMÁTICAMENTE
                    }
                }, 3000);
            }
        } catch(e){ alert("Error de conexión"); }
    }
    </script>
</body>
</html>
