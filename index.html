
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RECAUDACIÓN TECNOENTRETE</title>
    <style>
        :root { --neon: #00e5ff; --bg: #0b0b0b; --card: #161616; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #eee; margin: 0; padding: 15px; }
        .header { text-align: center; padding: 15px; border-bottom: 2px solid var(--neon); margin-bottom: 20px; }
        .status-bar { font-size: 12px; color: #f1c40f; margin-bottom: 10px; text-align: center; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .maq-head { display: flex; justify-content: space-between; font-weight: bold; color: #f1c40f; margin-bottom: 12px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .box { background: #000; padding: 10px; border-radius: 8px; border: 1px solid #222; }
        .label { font-size: 10px; color: #888; display: block; margin-bottom: 4px; text-transform: uppercase; }
        input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--neon); color: #fff; font-size: 18px; padding: 5px 0; outline: none; }
        .res-neto { margin-top: 10px; text-align: right; font-weight: 900; color: #27ae60; font-size: 20px; }
        .btn-enviar { background: var(--neon); color: #000; border: none; padding: 20px; width: 100%; border-radius: 12px; font-size: 20px; font-weight: bold; margin-top: 20px; cursor: pointer; box-shadow: 0 0 15px rgba(0,229,255,0.3); }
        .btn-enviar:disabled { background: #444; color: #888; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0">SISTEMA RECAUDACIÓN</h2>
        <div class="status-bar" id="status">Sincronizando con Planilla...</div>
    </div>

    <div id="contenedor-maquinas">
        </div>

    <button class="btn-enviar" id="btn-finalizar" onclick="enviarDatos()">FINALIZAR Y GUARDAR</button>

    <script>
        // TU URL DE GOOGLE APPS SCRIPT
        const _uA = "https://script.google.com/macros/s/AKfycbxFg9jyzTaJQwjdOyvpeq0ZmhCf4BegqGdRIQsWoZjF68Rs4Yq7kAW-1Fc0xyc1a6Ru/exec";
        
        let maquinasData = [];

        // 1. OBTENER DATOS DE TU EXCEL AL ABRIR
        window.onload = async () => {
            try {
                const r = await fetch(_uA + "?action=obtener_datos");
                maquinasData = await r.json();
                if(maquinasData.length > 0) {
                    renderMaquinas();
                    document.getElementById('status').innerText = "Planilla conectada ✅ (" + maquinasData.length + " máquinas)";
                } else {
                    document.getElementById('status').innerText = "No se encontraron máquinas en la fila 9 ⚠️";
                }
            } catch(e) {
                document.getElementById('status').innerText = "Error: No se pudo conectar con el Excel ❌";
                console.error(e);
            }
        };

        function renderMaquinas() {
            const cont = document.getElementById('contenedor-maquinas');
            cont.innerHTML = "";
            maquinasData.forEach((m, i) => {
                cont.innerHTML += `
                    <div class="card">
                        <div class="maq-head"><span>MÁQUINA ${m.n}</span> <span>${m.juego}</span></div>
                        <div class="grid">
                            <div class="box">
                                <span class="label">ENTRADA (Ant: ${m.in_ant})</span>
                                <input type="number" class="in-nue" placeholder="ACTUAL" oninput="calcular(${i})">
                            </div>
                            <div class="box">
                                <span class="label">SALIDA (Ant: ${m.out_ant})</span>
                                <input type="number" class="out-nue" placeholder="ACTUAL" oninput="calcular(${i})">
                            </div>
                        </div>
                        <div class="res-neto" id="neto-${i}">Neto: $0</div>
                    </div>
                `;
            });
        }

        function calcular(i) {
            const inNue = document.querySelectorAll('.in-nue')[i].value || 0;
            const outNue = document.querySelectorAll('.out-nue')[i].value || 0;
            
            // Cálculo: (Entrada Nueva - Entrada Antigua) - (Salida Nueva - Salida Antigua)
            const gananciaIn = inNue - maquinasData[i].in_ant;
            const gananciaOut = outNue - maquinasData[i].out_ant;
            const neto = gananciaIn - gananciaOut;
            
            const el = document.getElementById(`neto-${i}`);
            el.innerText = "Neto: $" + neto.toLocaleString();
            el.style.color = neto >= 0 ? "#27ae60" : "#e74c3c";
        }

        async function enviarDatos() {
            const btn = document.getElementById('btn-finalizar');
            const listaEnvio = [];
            const inputsIn = document.querySelectorAll('.in-nue');
            const inputsOut = document.querySelectorAll('.out-nue');

            btn.innerText = "GUARDANDO EN EXCEL...";
            btn.disabled = true;

            maquinasData.forEach((m, i) => {
                if(inputsIn[i].value !== "" && inputsOut[i].value !== "") {
                    listaEnvio.push({
                        n: m.n,
                        juego: m.juego,
                        in_ant: m.in_ant,
                        in_nue: inputsIn[i].value,
                        out_ant: m.out_ant,
                        out_nue: inputsOut[i].value
                    });
                }
            });

            if(listaEnvio.length === 0) {
                alert("Por favor, ingresa lecturas de al menos una máquina.");
                btn.disabled = false; btn.innerText = "FINALIZAR Y GUARDAR";
                return;
            }

            try {
                const url = _uA + "?action=guardar_recaudacion&local=LOCAL_PRUEBA&datos=" + encodeURIComponent(JSON.stringify(listaEnvio));
                const r = await fetch(url);
                const d = await r.json();
                
                if(d.status === "success") {
                    alert("✅ ¡RECAUDACIÓN GUARDADA!\nLos datos ya están en tu planilla.");
                    location.reload();
                }
            } catch(e) {
                alert("❌ Error al guardar. Verifica tu conexión.");
                btn.disabled = false; btn.innerText = "FINALIZAR Y GUARDAR";
            }
        }
    </script>
</body>
</html>
