<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TECNOENTRETE VIP v55.2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --c1: #e74c3c; --c2: #2c3e50; --c3: #27ae60; --c4: #f1c40f; --c5: #00e5ff; --c8: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none !important; -webkit-user-select: none !important; }
        html, body { height: 100dvh; width: 100vw; overflow: hidden; margin: 0; color: white; font-family: 'Segoe UI', sans-serif; background: url('https://raw.githubusercontent.com/tecnoentretenciones-lang/tecno-vip-1/main/image_1209a3.jpg') no-repeat center center fixed; background-size: cover; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: -1; }
        body { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
        #p-l, #app-principal { width: 100%; height: 100dvh; max-width: 500px; display: flex; flex-direction: column; padding: 12px; }
        #p-l { position: fixed; top: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; }
        .c-l { background: rgba(20, 20, 20, 0.95); border: 2px solid var(--c5); border-radius: 25px; padding: 25px; width: 100%; text-align: center; box-shadow: 0 0 30px rgba(0,229,255,0.2); }
        .ruleta-logo { width: 70px; height: 70px; margin-bottom: 10px; animation: rotar 5s linear infinite; filter: drop-shadow(0 0 10px var(--c5)); }
        @keyframes rotar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .legal-box { background: rgba(231, 76, 60, 0.2); border: 1px solid var(--c1); padding: 10px; border-radius: 12px; margin-bottom: 15px; font-size: 11px; color: #ff8888; font-weight: bold; }
        .i-s { width: 100%; background: #000; border: 2px solid #555; color: var(--c4); padding: 15px; border-radius: 12px; font-size: 22px; text-align: center; margin-bottom: 15px; outline: none; font-weight: bold; }
        .b-a { background: var(--c5); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 16px; margin-bottom: 10px; }
        #app-principal { display: none; justify-content: flex-start; }
        .tmr-big { background:#000; border:2px solid var(--c5); border-radius:15px; padding:15px; text-align:center; font-size: 32px; color: var(--c5); font-weight: 900; margin-bottom:8px; text-shadow: 0 0 10px var(--c5); }
        .ganancia-box { background: #000; border: 1px solid #333; border-radius: 15px; padding: 12px; display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        .stats-row { display: flex; justify-content: space-around; width: 100%; }
        .panel { background: var(--c8); border: 1px solid #333; border-radius: 15px; padding: 15px; display: flex; flex-direction: column; gap: 10px; flex-grow: 1; justify-content: space-around; }
        .b-i { flex: 1; height: 75px; border: none; border-radius: 15px; font-size: 32px; font-weight: bold; color: white; cursor: pointer; }
        .c-c { background: #000; border: 1px solid #222; border-radius: 12px; padding: 8px; display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; height: 95px; overflow-y: auto; }
        .bola { width: 25px; height: 25px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; }
        .wsp-f { margin-top: 15px; background: #25d366; padding: 14px; border-radius: 12px; display: flex; justify-content: center; align-items: center; color: white; font-size: 15px; font-weight: bold; text-decoration: none; gap: 10px; border: 1px solid #fff; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="p-l">
        <div class="c-l">
            <img src="https://cdn-icons-png.flaticon.com/512/1055/1055673.png" class="ruleta-logo">
            <h1 style="margin: 0 0 5px 0; font-size: 24px;">TECNOENTRETE VIP</h1>
            <div class="legal-box">AVISO: Software de análisis estadístico.</div>
            <div id="e-m" style="color: #ff4757; font-size: 13px; margin-bottom: 10px; font-weight: bold;"></div>
            <button id="btn-acepto" class="b-a">COMENZAR</button>
            <div id="step-1" style="display:none"><input type="text" id="l-i" class="i-s" placeholder="LICENCIA"><button class="b-a" id="btn-validar">VALIDAR</button></div>
            <div id="step-2" style="display:none"><input type="number" id="c-init" class="i-s" placeholder="SALDO"><button class="b-a" id="btn-entrar-nuevo">JUGAR</button></div>
        </div>
    </div>

    <div id="app-principal">
        <div id="tmr" class="tmr-big">00:00:00</div>
        <div class="ganancia-box">
            <div class="stats-row">
                <div style="text-align: center;"><div>SALDO</div><div id="cap-val">$0.00</div></div>
                <div style="text-align: center;"><div>NETO GLOBAL</div><div id="n-g" style="color: var(--c5);">$0.00</div></div>
            </div>
        </div>
        <div class="panel">
            <div id="s-t" style="font-size:70px; text-align:center;">---</div>
            <div id="m-t" style="color:var(--c3); text-align:center; font-size:24px;">$0.20</div>
            <div style="display: flex; gap: 10px;"><button class="b-i" id="btn-R" style="background:var(--c1);">R</button><button class="b-i" id="btn-N" style="background:var(--c2);">N</button><button class="b-i" id="btn-0" style="background:var(--c3);">0</button></div>
            <div id="c-h" class="c-c"></div>
        </div>
    </div>

    <script>
    (function(){
        const _uA = "https://script.google.com/macros/s/AKfycbxFg9jyzTaJQwjdOyvpeq0ZmhCf4BegqGdRIQsWoZjF68Rs4Yq7kAW-1Fc0xyc1a6Ru/exec";
        
        const getHID = () => {
            let key = localStorage.getItem('_tecno_hid');
            if(!key){
                key = 'VIP-' + Math.random().toString(36).substring(2, 10).toUpperCase();
                localStorage.setItem('_tecno_hid', key);
            }
            return key;
        };

        let _ba=0, _nG=0, _h=[], _m=0.2, _s="", _uL="", _uT="", _uS=0;

        document.getElementById('btn-acepto').onclick = () => {
            document.getElementById('btn-acepto').style.display='none';
            document.getElementById('step-1').style.display='block';
        };

        document.getElementById('btn-validar').onclick = async function(){
            _uL = document.getElementById('l-i').value.trim().toUpperCase();
            _uT = "T-" + Date.now();
            const r = await fetch(_uA + "?action=validar&serial="+_uL+"&token="+_uT+"&hid="+getHID());
            const d = await r.json();
            if(d.status === "success"){
                _uS = d.segundos;
                document.getElementById('step-1').style.display='none';
                document.getElementById('step-2').style.display='block';
            } else { alert(d.mensaje); }
        };

        document.getElementById('btn-entrar-nuevo').onclick = () => {
            _ba = parseFloat(document.getElementById('c-init').value);
            document.getElementById('p-l').style.display='none';
            document.getElementById('app-principal').style.display='flex';
            _upd();
        };

        function _fR(col){
            if(_s !== ""){
                if(col.toUpperCase() === _s){ _ba += _m; _nG += _m; _m = 0.2; }
                else if(col !== "Cero"){ _ba -= _m; _nG -= _m; _m *= 2; }
            }
            _h.unshift(col);
            _s = (col === "Rojo") ? "NEGRO" : "ROJO";
            _upd();
            _save();
        }

        function _upd(){
            document.getElementById('cap-val').innerText = "$" + _ba.toFixed(2);
            document.getElementById('n-g').innerText = "$" + _nG.toFixed(2);
            document.getElementById('s-t').innerText = _s || "---";
            document.getElementById('m-t').innerText = "$" + _m.toFixed(2);
            const ch = document.getElementById('c-h'); ch.innerHTML = "";
            _h.slice(0,15).forEach(v => {
                const color = (v === "Rojo") ? "red" : (v === "Negro" ? "white" : "green");
                ch.innerHTML += `<div class="bola" style="background:${color}; color:black;">${v[0]}</div>`;
            });
        }

        async function _save(){
            const estado = JSON.stringify({ba: _ba, nG: _nG, h: _h.slice(0,10), m: _m, s: _s});
            // ESTA LÍNEA ENVÍA EL NETO GLOBAL AL EXCEL
            new Image().src = _uA + "?action=guardar&licencia=" + _uL + "&token=" + _uT + "&estado=" + encodeURIComponent(estado);
        }

        document.getElementById('btn-R').onclick = () => _fR('Rojo');
        document.getElementById('btn-N').onclick = () => _fR('Negro');
        document.getElementById('btn-0').onclick = () => _fR('Cero');
    })();
    </script>
</body>
</html>
