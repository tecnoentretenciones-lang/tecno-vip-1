<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TECNOENTRETE VIP v52.0 - PROTECCIÓN TOTAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --c1: #e74c3c; --c2: #2c3e50; --c3: #27ae60; --c4: #f1c40f; --c5: #00e5ff; --c8: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none !important; -webkit-user-select: none !important; }
        html, body { height: 100dvh; width: 100vw; overflow: hidden; margin: 0; color: white; font-family: 'Segoe UI', sans-serif; background: url('https://raw.githubusercontent.com/tecnoentretenciones-lang/tecno-vip-1/main/image_1209a3.jpg') no-repeat center center fixed; background-size: cover; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: -1; }
        body { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
        #p-l, #app-principal { width: 100%; height: 100dvh; max-width: 500px; display: flex; flex-direction: column; padding: 12px; }
        #p-l { position: fixed; top: 0; background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center; }
        .c-l { background: rgba(20, 20, 20, 0.95); border: 2px solid var(--c5); border-radius: 25px; padding: 25px; width: 100%; text-align: center; box-shadow: 0 0 30px rgba(0,229,255,0.2); }
        .ruleta-logo { width: 70px; height: 70px; margin-bottom: 10px; animation: rotar 5s linear infinite; filter: drop-shadow(0 0 10px var(--c5)); }
        @keyframes rotar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .legal-box { background: rgba(231, 76, 60, 0.2); border: 1px solid var(--c1); padding: 10px; border-radius: 12px; margin-bottom: 15px; font-size: 11px; color: #ff8888; font-weight: bold; }
        .i-s { width: 100%; background: #000; border: 2px solid #555; color: var(--c4); padding: 15px; border-radius: 12px; font-size: 22px; text-align: center; margin-bottom: 15px; outline: none; font-weight: bold; }
        .b-a { background: var(--c5); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 16px; margin-bottom: 10px; }
        #app-principal { display: none; justify-content: flex-start; }
        .tmr-big { background:#000; border:2px solid var(--c5); border-radius:15px; padding:15px; text-align:center; font-size: 32px; color: var(--c5); font-weight: 900; margin-bottom:8px; text-shadow: 0 0 10px var(--c5); }
        .ganancia-box { background: #000; border: 1px solid #333; border-radius: 15px; padding: 12px; display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        .panel { background: var(--c8); border: 1px solid #333; border-radius: 15px; padding: 15px; display: flex; flex-direction: column; gap: 10px; flex-grow: 1; justify-content: space-around; }
        .bola { width: 25px; height: 25px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; }
        .wsp-f { margin-top: 15px; background: #25d366; padding: 14px; border-radius: 12px; display: flex; justify-content: center; align-items: center; color: white; font-size: 15px; font-weight: bold; text-decoration: none; gap: 10px; border: 1px solid #fff; }
        #alerta-meta { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10005; display: none; justify-content: center; align-items: center; flex-direction: column; }
        .nube-voladora { background: linear-gradient(135deg, #f1c40f, #f39c12); color: #000; padding: 25px; border-radius: 30px; text-align: center; max-width: 90%; border: 4px solid #fff; }
    </style>
</head>
<body oncontextmenu="return false;" onkeydown="if(event.keyCode==123)return false;">

    <div id="alerta-meta">
        <div class="nube-voladora">
            <div style="font-size: 50px;">🛑💰</div>
            <h2 style="margin: 10px 0; font-weight: 900;">¡OBJETIVO LOGRADO!</h2>
            <p style="margin: 0; font-weight: 600; font-size: 14px;">Has ganado el 20%. Para proteger tu racha, <b>¡ARRANCA AHORA!</b> Descanse y vuelva más tarde.</p>
            <button style="background:#000; color:#f1c40f; border:none; padding:15px; border-radius:15px; margin-top:15px; font-weight:900; width:100%;" onclick="aceptarMeta()">ENTIENDO</button>
        </div>
    </div>

    <div id="p-l">
        <div class="c-l" id="login-container">
            <img src="https://cdn-icons-png.flaticon.com/512/1055/1055673.png" class="ruleta-logo">
            <h1 style="margin: 0 0 5px 0; font-size: 24px;">TECNOENTRETE VIP</h1>
            <p style="font-size: 14px; color: var(--c4); font-weight: bold; margin-bottom: 15px;">SOFTWARE PARA GANARLE A LA RULETA</p>
            <div class="legal-box">⚠️ USO BAJO SU PROPIO RIESGO.</div>
            <div id="e-m" style="color: #ff4757; font-size: 13px; margin-bottom: 10px; font-weight: bold;"></div>
            <button id="btn-acepto" class="b-a">ACEPTO Y COMIENZO</button>
            <div id="step-1" style="display:none">
                <input type="text" id="l-i" class="i-s" placeholder="LICENCIA">
                <button class="b-a" id="btn-validar">VALIDAR</button>
            </div>
            <div id="step-2" style="display:none">
                <input type="number" id="c-init" class="i-s" placeholder="SALDO MESA">
                <button class="b-a" id="btn-entrar-nuevo">ENTRAR</button>
                <button class="b-a" id="btn-continuar-sesion" style="display:none; background:#27ae60; color:white; margin-top:10px;">SINCRONIZAR PARTIDA</button>
            </div>
            <a href="https://wa.me/56995931641?text=Soporte%20VIP" class="wsp-f"><i class="fab fa-whatsapp"></i> SOPORTE</a>
        </div>
    </div>

    <div id="app-principal">
        <div id="tmr" class="tmr-big">00d 00h 00m 00s</div>
        <div class="ganancia-box">
            <div style="font-size: 11px; color: #ffae00; font-weight: bold; text-align: center; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 5px;">ENTRASTE CON: <span id="val-inicial">$0.00</span></div>
            <div style="display: flex; justify-content: space-around;">
                <div style="text-align: center;"><div style="font-size: 10px; color: #888;">SALDO ACTUAL</div><div style="font-size: 22px; font-weight: 900;" id="cap-val">$0.00</div></div>
                <div style="text-align: center;"><div style="font-size: 10px; color: #888;">NETO GLOBAL</div><div style="font-size: 22px; font-weight: 900; color: var(--c5);" id="n-g">$0.00</div></div>
            </div>
        </div>
        <div class="panel">
            <div style="background: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 20px; text-align: center;">
                <div id="s-t" style="font-size:75px; font-weight:900;">---</div>
                <div id="m-t" style="color:var(--c3); font-weight:900; font-size:26px;">$0.20</div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="b-i" id="btn-R" style="background:var(--c1); height:75px; border-radius:15px;">R</button>
                <button class="b-i" id="btn-N" style="background:var(--c2); height:75px; border-radius:15px;">N</button>
                <button class="b-i" id="btn-0" style="background:var(--c3); height:75px; border-radius:15px;">0</button>
            </div>
            <div id="c-h" style="background:#000; border:1px solid #222; border-radius:12px; padding:8px; display:flex; flex-wrap:wrap; justify-content:center; gap:5px; height:95px; overflow-y:auto;"></div>
            <div style="display: flex; gap: 8px;">
                <button style="background:transparent; color:#555; border:1px solid #222; padding:12px; border-radius:10px; font-size:11px; flex:1;" id="btn-undo">CORREGIR</button>
                <button style="background:transparent; color:#f1c40f; border:1px solid #f1c40f; padding:12px; border-radius:10px; font-size:11px; flex:1.2; opacity:0.3; pointer-events:none;" id="btn-trampa">⚠️ TRAMPA</button>
                <button style="background:transparent; color:#e74c3c; border:1px solid #e74c3c; padding:12px; border-radius:10px; font-size:11px; flex:1;" id="btn-reset">REINICIAR</button>
            </div>
        </div>
    </div>

    <script>
    (function(){
        /* CANDADO DE DOMINIO */
        const d_ok = "tecnoentretenciones-lang.github.io";
        if(window.location.hostname !== d_ok && window.location.hostname !== "localhost") {
            document.body.innerHTML = "<div style='padding:50px; text-align:center; color:red; font-weight:bold;'>⚠️ ERROR: LICENCIA PIRATEADA O DOMINIO NO AUTORIZADO.<br>Contacte a TECNOENTRETE para adquirir una copia legal.</div>";
            return;
        }

        /* BLOQUEO SAFARI IPHONE */
        document.addEventListener('touchstart', (e) => { if(e.touches.length > 1) e.preventDefault(); }, {passive: false});
        let lastT = 0; document.addEventListener('touchend', (e) => { let n = Date.now(); if(n - lastT <= 300) e.preventDefault(); lastT = n; }, false);
        document.addEventListener('gesturestart', (e) => e.preventDefault());

        let _ba=0, _cI=0, _nP=0, _nG=0, _g=0, _p=0, _h=[], _m=0.2, _s="", _uL="", _uT="", _uS=0, _lS=null, _proximaMeta=0;
        const _uA = "https://script.google.com/macros/s/AKfycbzZnxMcWUM7wUQqEBsuaUHfQJeF4g-auZG7s5jrGFONOx3yyAOYgRRvDW0d1QewuC2pfg/exec";

        document.getElementById('btn-acepto').onclick = () => { document.getElementById('btn-acepto').style.display='none'; document.getElementById('step-1').style.display='block'; };
        document.getElementById('btn-validar').onclick = async function(){
            const s=document.getElementById('l-i').value.trim().toUpperCase(); if(!s) return;
            this.innerText="ESPERE..."; _uT="W-"+Date.now();
            try {
                const r = await fetch(_uA+"?action=validar&serial="+s+"&token="+_uT);
                const d = await r.json();
                if(d.status==="success"){
                    _uL=s; _uS=parseInt(d.segundos);
                    if(d.estado_nube) { localStorage.setItem('tecno_save_'+_uL, d.estado_nube); const x = JSON.parse(d.estado_nube); _nG = x.nG || 0; document.getElementById('btn-continuar-sesion').style.display='block'; }
                    document.getElementById('step-1').style.display='none'; document.getElementById('step-2').style.display='block';
                } else { document.getElementById('e-m').innerText=d.mensaje; this.innerText="VALIDAR"; }
            } catch(e){ document.getElementById('e-m').innerText="ERROR DE RED"; this.innerText="VALIDAR"; }
        };
        document.getElementById('btn-entrar-nuevo').onclick = function(){
            const v=parseFloat(document.getElementById('c-init').value); if(isNaN(v)||v<=0) return;
            _ba=v; _cI=v; _proximaMeta = _ba * 1.20; document.getElementById('val-inicial').innerText = "$" + v.toFixed(2); _arrancar();
        };
        document.getElementById('btn-continuar-sesion').onclick = function(){
            const sv = localStorage.getItem('tecno_save_'+_uL);
            if(sv){ const x=JSON.parse(sv); _ba=x.ba; _nP=x.nP; _nG=x.nG; _cI=x.cI||x.ba; _g=x.g; _p=x.p; _h=x.h; _m=x.m; _s=x.s; _proximaMeta = _ba * 1.20; document.getElementById('val-inicial').innerText = "$" + _cI.toFixed(2); }
            _arrancar();
        };
        window.aceptarMeta = function() { document.getElementById('alerta-meta').style.display = 'none'; _proximaMeta = _ba * 1.20; };
        function _arrancar(){ document.getElementById('p-l').style.display='none'; document.getElementById('app-principal').style.display='flex'; setInterval(_fClock, 1000); setInterval(_fCheck, 20000); _fUpd(); }
        function _fR(c){
            _lS = JSON.parse(JSON.stringify({ba:_ba, nP:_nP, nG:_nG, g:_g, p:_p, h:_h, m:_m, s:_s}));
            if(_s!==""){ if(c.toUpperCase()===_s){ _ba+=_m; _nP+=_m; _nG+=_m; _m=0.2; _g++; } else if(c!=='Cero'){ _ba-=_m; _nP-=_m; _nG-=_m; _m*=2; _p++; } }
            _h.unshift(c); _calc(); _save(); _fUpd();
            if(_ba >= _proximaMeta) { document.getElementById('alerta-meta').style.display = 'flex'; }
        }
        function _calc() {
            if(_h.length === 0) return;
            let u=_h[0], p=_h[1]||"", a=_h[2]||"", t=_h[3]||"";
            if(u==='Cero'){ _s=(p==='Rojo')?'ROJO':(p==='Negro'?'NEGRO':''); return; }
            if(u===p && a===t && u!==a && _h[4]===_h[5] && u===_h[4]) { _s = (u==="Rojo") ? "NEGRO" : "ROJO"; return; }
            if(u==='Rojo'&&p==='Rojo'&&a==='Rojo'&&t==='Rojo'&&_h[4]==='Negro'&&_h[5]==='Negro'){_s="NEGRO";return;}
            if(u==='Negro'&&p==='Negro'&&a==='Negro'&&t==='Negro'&&_h[4]==='Rojo'&&_h[5]==='Rojo'){_s="ROJO";return;}
            let r=1; for(let i=0;i<_h.length-1;i++){if(_h[i]===_h[i+1])r++;else break;}
            if(u===p&&a===t&&u!==a&&a!==""){_s=u.toUpperCase();} else if(r>=3){_s=u.toUpperCase();} else{_s=(u==="Rojo")?"NEGRO":"ROJO";}
        }
        function _fUpd(){
            document.getElementById('cap-val').innerText="$"+_ba.toFixed(2); document.getElementById('n-g').innerText="$"+_nG.toFixed(2);
            document.getElementById('s-t').innerText=_s||"---"; document.getElementById('s-t').style.color=(_s==="ROJO")?"#e74c3c":"#fff";
            document.getElementById('m-t').innerText="$"+_m.toFixed(2);
            const ch=document.getElementById('c-h'); ch.innerHTML="";
            _h.slice(0,28).forEach((v,idx)=>{
                const cl=(v==='Rojo')?'red':(v==='Negro'?'#fff':'green');
                const bd=(idx===0)?'border:2.5px solid var(--c5); box-shadow:0 0 10px var(--c5);':'';
                ch.innerHTML+=`<div class="bola" style="background:${cl}; color:${v==='Negro'?'#000':'#fff'}; ${bd}">${v==='Cero'?'0':''}</div>`;
            });
            let bt=document.getElementById('btn-trampa');
            if(_m>=25.6){ bt.style.opacity="1"; bt.style.pointerEvents="auto"; } else { bt.style.opacity="0.3"; bt.style.pointerEvents="none"; }
            const url = _uA+"?action=guardar&licencia="+_uL+"&ganadas="+_g+"&perdidas="+_p+"&neto="+_nG.toFixed(2)+"&estado="+encodeURIComponent(JSON.stringify({ba:_ba,nP:_nP,nG:_nG,cI:_cI,g:_g,p:_p,h:_h.slice(0,15),m:_m,s:_s}));
            new Image().src = url;
        }
        function _fClock(){ if(_uS > 0){ _uS--; let d=Math.floor(_uS/86400), h=Math.floor((_uS%86400)/3600), m=Math.floor((_uS%3600)/60), s=_uS%60; document.getElementById('tmr').innerText=d+"d "+h+"h "+m+"m "+s+"s"; } }
        async function _fCheck(){ try { const r=await fetch(_uA+"?action=chequear_sesion&serial="+_uL+"&token="+_uT); const d=await r.json(); if(d.status==="kick") location.reload(); } catch(e){} }
        function _save(){ localStorage.setItem('tecno_save_'+_uL, JSON.stringify({ba:_ba,nP:_nP,nG:_nG,cI:_cI,g:_g,p:_p,h:_h,m:_m,s:_s})); }
        document.getElementById('btn-R').onclick=()=>_fR('Rojo'); document.getElementById('btn-N').onclick=()=>_fR('Negro'); document.getElementById('btn-0').onclick=()=>_fR('Cero');
        document.getElementById('btn-undo').onclick=()=>{ if(_lS){ _ba=_lS.ba;_nP=_lS.nP;_nG=_lS.nG;_g=_lS.g;_p=_lS.p;_h=_lS.h;_m=_lS.m;_s=_lS.s;_fUpd(); } };
        document.getElementById('btn-reset').onclick=()=>{ if(confirm("¿Limpiar mesa? El Neto Global se mantiene.")){ _nP=0; _h=[]; _m=0.2; _fUpd(); } };
        document.getElementById('btn-trampa').onclick = function(){ new Image().src = _uA+"?action=reportar_fallo&licencia="+_uL+"&patron="+_h.slice(0,28).join("-"); alert("⚠️ Reportado."); };
    })();
    </script>
</body>
</html>
