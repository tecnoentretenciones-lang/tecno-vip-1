<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TECNOENTRETE VIP PRO - ENGINE LOCAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --c1: #e74c3c; --c2: #2c3e50; --c3: #27ae60; --c4: #f1c40f; --c5: #00e5ff; --c8: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none !important; user-select: none !important; }
        input, select { user-select: text !important; -webkit-user-select: text !important; }

        html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden !important; background-color: #000; position: fixed; font-family: 'Segoe UI', sans-serif; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://raw.githubusercontent.com/tecnoentretenciones-lang/tecno-vip-1/main/image_1209a3.jpg') no-repeat center center; background-size: cover; z-index: -2; }
        body::after { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: -1; }
        @keyframes rotar { 100% { transform: rotate(360deg); } }
        
        #p-l, #p-select { width: 100%; height: 100dvh; max-width: 500px; display: flex; flex-direction: column; padding: 20px; margin: auto; position: fixed; top: 0; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; }
        .c-l { background: rgba(20, 20, 20, 0.98); border: 2px solid var(--c5); border-radius: 20px; padding: 25px 15px; width: 100%; text-align: center; box-shadow: 0 0 20px rgba(0,229,255,0.2); }
        .i-s { width: 100%; background: #000; border: 2px solid #555; color: var(--c4); padding: 15px; border-radius: 10px; font-size: 16px; text-align: center; margin-bottom: 10px; outline: none; font-weight: bold; }
        .b-a { background: var(--c5); color: #000; border: none; padding: 18px; border-radius: 10px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 14px; margin-bottom: 10px; transition: 0.2s;}
        .b-a:active { transform: scale(0.95); }

        #app-principal { display: none; flex-direction: column; height: 100dvh; width: 100%; padding-top: calc(env(safe-area-inset-top) + 10px); }
        
        #global-wallet { background:#000; border:1px solid #333; border-radius:15px; padding:12px; display:flex; justify-content:space-around; margin: 0 10px 10px 10px; }
        .gw-box { text-align:center; }
        .gw-title { font-size:11px; color:#888; text-transform: uppercase; }
        .gw-val { font-size:18px; font-weight:bold; }
        
        #tabs-container { display: flex; padding: 0 10px 10px 10px; gap: 5px; }
        .tab-btn { flex: 1; background: #222; color: #888; border: 1px solid #444; border-radius: 10px; padding: 12px 0; font-weight: bold; font-size: 12px; text-align: center; cursor: pointer; }
        .tab-btn.active { background: var(--c5); color: #000; border-color: var(--c5); box-shadow: 0 0 10px rgba(0,229,255,0.4); }

        #grid-mesas { flex-grow: 1; display: grid; gap: 10px; padding: 0 10px 10px 10px; overflow-y: auto; height: 100%; }
        .mesa-wrapper { display: none; flex-direction: column; height: 100%; width: 100%; gap: 10px; }
        .mesa-wrapper.active { display: flex; flex-grow: 1; }
        .interior-mesa { background:var(--c8); padding:15px; border-radius:15px; display:flex; flex-direction:column; gap:10px; flex-grow:1; border:1px solid #333; justify-content: space-between; }

        .tmr-big { background:#000; border:2px solid var(--c5); border-radius: 12px; padding:10px; text-align:center; font-size: 26px; color: var(--c5); font-weight: 900; margin: 0 10px 10px 10px;}
        .bola { display: inline-flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 50%; }
        .stats-bar { background:#0a0a0a; border:1px solid #333; border-radius:10px; padding:8px 10px; display:flex; justify-content:space-between; font-size:12px; font-weight:bold; color:#aaa; }
        .b-i { border-radius:15px; border:none; color:white; flex:1; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center;}

        /* 🔥 REGLAS PARA 1 SOLA MESA (AHORA GIGANTE Y ANCHA PARA PC) 🔥 */
        .grid-1 { display: flex !important; flex-direction: column; max-width: 900px; margin: auto; width: 100%; justify-content: center; padding: 20px; }
        .grid-1 .interior-mesa { padding: 40px; gap: 25px; border-width: 2px; }
        .grid-1 [id^="s-t-"] { font-size: 140px; font-weight: 900; line-height: 1; margin-bottom: 5px;}
        .grid-1 [id^="m-t-"] { font-size: 45px; color: var(--c4); margin-bottom: 10px;}
        .grid-1 .b-i { height: 120px; font-size: 55px; border-radius: 20px; }
        .grid-1 [id^="c-h-"] { height: 130px; background:#000; border-radius:15px; border:2px solid #222; display:flex; flex-wrap:wrap; justify-content:center; align-items: center; gap:10px; overflow:hidden; padding: 15px; }
        .grid-1 .bola { width: 40px; height: 40px; font-size: 18px; border-width: 2px; }
        .grid-1 .stats-bar { padding: 25px; font-size: 20px; border-radius: 15px; }
        .grid-1 button[onclick*="deshacer"], .grid-1 button[onclick*="reportarTrampa"], .grid-1 button[onclick*="resetear"] { padding: 25px; font-size: 18px; border-radius: 12px; }

        /* 🔥 REGLAS PARA 4 MESAS (COMPACTAS) 🔥 */
        @media (min-width: 768px) {
            #tabs-container { display: none !important; }
            .grid-1 { height: 100%; }
            .grid-2 { grid-template-columns: 1fr 1fr; }
            .grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; overflow: hidden; }
            .mesa-wrapper { display: flex !important; min-height: 0; }
            
            .grid-4 .tmr-big { padding: 5px; font-size: 2vh; margin-bottom: 5px; }
            .grid-4 #global-wallet { padding: 8px; margin-bottom: 5px; }
            .grid-4 .gw-val { font-size: 2.2vh; }
            .grid-4 .interior-mesa { padding: 1.5vh; gap: 1vh; justify-content: space-evenly; }
            .grid-4 [id^="s-t-"] { font-size: 5vh; }
            .grid-4 [id^="m-t-"] { font-size: 2.5vh; }
            .grid-4 .b-i { height: 6.5vh; font-size: 3vh; border-radius: 10px; }
            .grid-4 [id^="c-h-"] { height: 6vh; padding: 2px; background:#000; border-radius:10px; display:flex; flex-wrap:wrap; justify-content:center; align-items: center; gap:2px; overflow:hidden; }
            .grid-4 .bola { width: 3vh; height: 3vh; font-size: 1.2vh; margin: 1px; }
            .grid-4 .stats-bar { padding: 0.6vh 1vh; font-size: 1.4vh; border-radius: 8px; }
            .grid-4 button[onclick*="deshacer"], .grid-4 button[onclick*="reportarTrampa"], .grid-4 button[onclick*="resetear"] { padding: 1vh; font-size: 1.2vh; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="alerta-trampa-custom" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 10006; display: none; justify-content: center; align-items: center; flex-direction: column; padding:20px;">
        <div style="background: rgba(20,20,20,0.98); border: 2px solid var(--c1); color: #fff; padding: 25px; border-radius: 20px; text-align: center; max-width: 400px;">
            <div style="font-size: 50px;">⚠️</div>
            <h2 style="color: var(--c1); margin: 10px 0;">¡ALERTA DE CASINO!</h2>
            <p id="txt-alerta-trampa" style="font-size: 15px; color: #ccc; margin-bottom: 20px;"></p>
            <button class="b-a" onclick="document.getElementById('alerta-trampa-custom').style.display='none'">ENTENDIDO</button>
        </div>
    </div>

    <div id="p-l">
        <div class="c-l">
            <img src="https://cdn-icons-png.flaticon.com/512/1055/1055673.png" style="width:70px; animation: rotar 5s linear infinite; margin-bottom:10px;">
            <h1 style="color:white; font-size:24px; margin:0 0 5px 0;">TECNOENTRETE VIP</h1>
            <p style="color:#00e5ff; font-size:12px; margin-top:0; margin-bottom:20px; font-weight: bold;">MOTOR LOCAL 0-LAG ACTIVADO</p>
            <input type="text" id="u-i" class="i-s" placeholder="USUARIO" autocomplete="off">
            <input type="password" id="l-i" class="i-s" placeholder="CLAVE / LICENCIA" autocomplete="off">
            <button class="b-a" id="btn-validar">ENTRAR AL SISTEMA</button>
        </div>
    </div>

    <div id="p-select" style="display:none;">
        <div class="c-l" style="border-color: var(--c4);">
            <h2 style="color:var(--c4); margin-top:0;">MODO VIP PRO</h2>
            <p style="color:#fff; font-size:14px; margin-bottom:20px;">¿Cuántas mesas abrirá simultáneamente?</p>
            <button class="b-a" style="background:#222; color:white; border:1px solid #555;" onclick="iniciarMesas(1)">1 MESA (GIGANTE)</button>
            <button class="b-a" style="background:#333; color:white; border:1px solid #666;" onclick="iniciarMesas(2)">2 MESAS</button>
            <button class="b-a" style="background:var(--c4); color:black;" onclick="iniciarMesas(4)">4 MESAS</button>
        </div>
    </div>

    <div id="app-principal">
        <div id="tmr" class="tmr-big">00d-00h:00m:00s</div>
        <div id="global-wallet">
            <div class="gw-box"><div class="gw-title">CAPITAL TOTAL</div><div id="gw-cap" class="gw-val" style="color:#fff;">$0.00</div></div>
            <div class="gw-box"><div class="gw-title">UTILIDAD GLOBAL</div><div id="gw-util" class="gw-val" style="color:var(--c3);">$0.00</div></div>
            <div class="gw-box"><div class="gw-title">NETO (OBJETIVO)</div><div id="gw-neto" class="gw-val" style="color:var(--c5);">$0.00</div></div>
        </div>
        <div id="tabs-container"></div>
        <div id="grid-mesas"></div>
    </div>

    <script>
    document.addEventListener('contextmenu', e => e.preventDefault());

    window.trampasLocales = [];
    function motorCalculoLocal(historial) {
        if (!historial || historial.length === 0) return "---";
        let u = historial[0] || "", p = historial[1] || "", a = historial[2] || "", t = historial[3] || "";
        let racha_actual = 1;
        for(let k=0; k<historial.length-1; k++){ if(historial[k] === historial[k+1]) racha_actual++; else break; }

        let sugerencia_normal = "";
        if(u === 'Cero'){ sugerencia_normal = (p === 'Rojo') ? 'ROJO' : (p === 'Negro' ? 'NEGRO' : ''); }
        else if(u === p && a === t && u !== a && historial[4] === historial[5] && u === historial[4]){ sugerencia_normal = (u === "Rojo") ? "NEGRO" : "ROJO"; }
        else {
            if(u === p && a === t && u !== a && a !== ""){ sugerencia_normal = u.toUpperCase(); }
            else if(racha_actual >= 3){ sugerencia_normal = u.toUpperCase(); }
            else { sugerencia_normal = (u === "Rojo") ? "NEGRO" : "ROJO"; }
        }

        let s_final = sugerencia_normal;
        if(racha_actual >= 4 && u !== 'Cero') { s_final = u.toUpperCase(); } else {
            let next_c = sugerencia_normal === "ROJO" ? "R" : (sugerencia_normal === "NEGRO" ? "N" : "");
            if (next_c !== "") {
                let mapHist = historial.map(v => String(v).charAt(0).toUpperCase());
                mapHist.unshift(next_c);
                let h_hipo = mapHist.join("-");
                for(let j=0; j<window.trampasLocales.length; j++) {
                    if(window.trampasLocales[j].length > 2 && h_hipo.indexOf(window.trampasLocales[j]) === 0) {
                        s_final = (sugerencia_normal === "ROJO") ? "NEGRO" : "ROJO"; break;
                    }
                }
            }
        }
        return s_final;
    }

    function mostrarAlerta(mensaje) { document.getElementById('txt-alerta-trampa').innerHTML = mensaje; document.getElementById('alerta-trampa-custom').style.display = 'flex'; }

    // 🔥 AQUÍ ESTÁ TU ENLACE CORRECTO Y ORIGINAL 🔥
    const _URL = "https://script.google.com/macros/s/AKfycbzUIdq4jKKOi3_fu3kLsO_cP3Z9ckXp7B6sUiP78B7Km7bDVmaecAIdsWGgGcA8nlE8JA/exec";
    
    const { machineIdSync } = require('node-machine-id');
    let _L="", _U="", _HID = "PC-" + machineIdSync().substring(0, 15).toUpperCase();
    
    let _S = 0, _TS = 0, _IS = 0, capitalGlobal = 40, mesasInstancias = [];

    window.saveState = function() { 
        if(!_L) return;
        let utilTotal = mesasInstancias.reduce((a, b) => a + b._nP, 0);
        let estadoMesas = mesasInstancias.map(m => ({ nP: m._nP, h: m._h.slice(0,10), m: m._m, s: m._s, per: m._per, cR: m._cR, cN: m._cN, c0: m._c0, s0: m._s0 }));
        let est = JSON.stringify({ cap: capitalGlobal, mesas: estadoMesas });
        localStorage.setItem('ts_pro_'+_L, est);
        fetch(_URL + `?action=guardar&usuario=${encodeURIComponent(_U)}&serial=${encodeURIComponent(_L)}&neto_global=${utilTotal.toFixed(2)}&estado=${encodeURIComponent(est)}`).catch(e=>{});
    };

    document.getElementById('btn-validar').onclick = async function() {
        _U = document.getElementById('u-i').value.trim();
        _L = document.getElementById('l-i').value.trim().toUpperCase();
        if(!_U || !_L) return alert("Ingrese Usuario y Clave");
        
        this.innerText = "... CONECTANDO AL CLOUD ...";
        try {
            const r = await fetch(_URL + "?action=validar&app=mesa_segura&usuario=" + encodeURIComponent(_U) + "&serial=" + encodeURIComponent(_L) + "&hid=" + _HID);
            const d = await r.json();
            
            if(d.status === "success") { 
                _S = d.segundos; 
                let planCliente = d.plan ? String(d.plan).toUpperCase().trim() : "BASICO";

                this.innerText = "... DESCARGANDO TRAMPAS ...";
                try {
                    let rT = await fetch(_URL + "?action=panel_trampas");
                    let dT = await rT.json();
                    if(dT.status === "success" && dT.datos) {
                        dT.datos.forEach(row => {
                            if(row[2]) {
                                let ptn = String(row[2]).toUpperCase().split("_")[0].trim().replace(/ROJO/g, 'R').replace(/NEGRO/g, 'N').replace(/CERO/g, '0');
                                if(ptn.length > 2) window.trampasLocales.push(ptn);
                            }
                        });
                    }
                } catch(e) { console.log("Se usarán las trampas offline previas."); }

                let savedJSON = d.estado_nube || localStorage.getItem('ts_pro_'+_L);
                if(savedJSON && savedJSON.includes("{")) {
                    if(confirm("☁️ Tienes una sesión guardada.\n\n¿Deseas CONTINUAR la partida anterior?")) {
                        try { 
                            let st = JSON.parse(savedJSON); 
                            capitalGlobal = parseFloat(st.cap) || 40;
                            document.getElementById('p-l').style.display='none';
                            iniciarMesas(st.mesas ? st.mesas.length : 1, st.mesas);
                            return;
                        } catch(e) {}
                    }
                }

                document.getElementById('p-l').style.display='none';
                
                // 🔥 EL ROUTER: AHORA SÍ LEERÁ SI ERES PRO DESDE TU CÓDIGO ACTUALIZADO
                if(planCliente.includes("VIP") || planCliente.includes("PRO") || planCliente.includes("MULTIMESA")) {
                    document.getElementById('p-select').style.display='flex';
                } else {
                    iniciarMesas(1); 
                }

            } else { alert(d.mensaje); this.innerText = "ENTRAR AL SISTEMA"; }
        } catch(e) { alert("Error de Conexión."); this.innerText = "ENTRAR AL SISTEMA"; }
    };

    window.iniciarMesas = (cant, savedData = null) => {
        document.getElementById('p-select').style.display = 'none';
        document.getElementById('app-principal').style.display = 'flex';
        const grid = document.getElementById('grid-mesas');
        const tabs = document.getElementById('tabs-container');
        grid.className = "grid-" + cant;

        for(let i=1; i<=cant; i++) {
            let t = document.createElement('button');
            t.className = i===1 ? "tab-btn active" : "tab-btn"; t.innerText = "MESA " + i; t.onclick = () => cambiarTab(i, cant);
            tabs.appendChild(t);

            let mHTML = `
            <div class="mesa-wrapper ${i===1?'active':''}" id="mesa-${i}">
                <div style="text-align:center; font-weight:bold; color:#888; font-size:13px; text-transform:uppercase;">MESA ${i} - UTILIDAD: <span id="u-s-${i}" style="color:var(--c3);">$0.00</span></div>
                <div class="interior-mesa">
                    <div style="background:#1a1a1a; padding:15px; border-radius:15px; text-align:center; border:1px solid #333;">
                        <div id="s-t-${i}">---</div>
                        <div id="m-t-${i}">$0.20</div>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="b-i" style="background:var(--c1);" onclick="mesasInstancias[${i-1}].xfR('Rojo')">R</button>
                        <button class="b-i" style="background:var(--c2);" onclick="mesasInstancias[${i-1}].xfR('Negro')">N</button>
                        <button class="b-i" style="background:var(--c3);" onclick="mesasInstancias[${i-1}].xfR('Cero')">0</button>
                    </div>
                    <div id="c-h-${i}"></div>
                    
                    <div class="stats-bar">
                        <div><span style="color:var(--c1)">R:</span> <span id="st-R-${i}">0</span></div>
                        <div><span style="color:#fff">N:</span> <span id="st-N-${i}">0</span></div>
                        <div><span style="color:var(--c3)">0:</span> <span id="st-0-${i}">0</span></div>
                        <div><span style="color:var(--c4)">S/0:</span> <span id="st-s0-${i}">0</span></div>
                    </div>

                    <div style="display:flex; gap:6px;">
                        <button style="background:transparent; color:#555; border:1px solid #333; padding:12px; border-radius:10px; font-weight:bold; flex:1; cursor:pointer;" onclick="mesasInstancias[${i-1}].deshacer()">CORREGIR</button>
                        <button id="btn-trampa-${i}" style="background:transparent; color:var(--c4); border:1px solid var(--c4); padding:12px; border-radius:10px; font-weight:bold; flex:1.5; opacity:0.3; pointer-events:none; cursor:pointer;" onclick="mesasInstancias[${i-1}].reportarTrampa()">⚠️ TRAMPA</button>
                        <button style="background:transparent; color:var(--c1); border:1px solid var(--c1); padding:12px; border-radius:10px; font-weight:bold; flex:1; cursor:pointer;" onclick="mesasInstancias[${i-1}].resetear()">RESET</button>
                    </div>
                </div>
            </div>`;
            grid.insertAdjacentHTML('beforeend', mHTML);
            
            let motor = new MotorFelipe(i);
            if (savedData && savedData[i-1]) {
                let sd = savedData[i-1]; motor._nP=sd.nP||0; motor._h=sd.h||[]; motor._m=sd.m||0.2; motor._s=sd.s||""; motor._per=sd.per||0; motor._cR=sd.cR||0; motor._cN=sd.cN||0; motor._c0=sd.c0||0; motor._s0=sd.s0||0;
            }
            mesasInstancias.push(motor);
        }
        actualizarBilletera(); mesasInstancias.forEach(m => m.update()); iniciarReloj();
    };

    window.cambiarTab = (id, total) => { for(let i=1; i<=total; i++) { document.getElementById('mesa-'+i).classList.toggle('active', i===id); document.querySelectorAll('.tab-btn')[i-1].classList.toggle('active', i===id); } };
    function actualizarBilletera() { let ut = mesasInstancias.reduce((a, b) => a + b._nP, 0); document.getElementById('gw-cap').innerText = "$" + capitalGlobal.toFixed(2); document.getElementById('gw-util').innerText = "$" + ut.toFixed(2); document.getElementById('gw-neto').innerText = "$" + (capitalGlobal + ut).toFixed(2); }

    function iniciarReloj() {
        _TS = Date.now(); _IS = _S;
        setInterval(() => {
            let e = Math.floor((Date.now()-_TS)/1000); _S = Math.max(0, _IS - e);
            let d=Math.floor(_S/86400), h=Math.floor((_S%86400)/3600), m=Math.floor((_S%3600)/60), s=_S%60;
            document.getElementById('tmr').innerText = `${d}d-${h}h:${m}m:${s}s`; if(_S<=0) location.reload();
        }, 1000);
        setInterval(saveState, 15000); 
    }

    class MotorFelipe {
        constructor(id) { this.id = id; this._h = []; this._m = 0.2; this._s = ""; this._per = 0; this._nP = 0; this._cR = 0; this._cN = 0; this._c0 = 0; this._s0 = 0; this._lS = null; }
        
        xfR(c) {
            this._lS = {nP:this._nP, h:[...this._h], m:this._m, s:this._s, per:this._per, cR:this._cR, cN:this._cN, c0:this._c0, s0:this._s0};
            if (c === 'Rojo') { this._cR++; this._s0++; } else if (c === 'Negro') { this._cN++; this._s0++; } else if (c === 'Cero') { this._c0++; this._s0 = 0; }
            if(this._s !== "") { if(c.toUpperCase() === this._s){ this._nP += this._m; this._m = 0.2; this._per = 0; } else if(c !== 'Cero'){ this._nP -= this._m; this._m *= 2; this._per++; } }
            
            this._h.unshift(c);
            this._s = motorCalculoLocal(this._h.slice(0, 15));
            this.update(); actualizarBilletera(); saveState(); 

            if(this._per >= 7) {
                document.getElementById('btn-trampa-'+this.id).style.opacity="1"; document.getElementById('btn-trampa-'+this.id).style.pointerEvents="auto";
                if(this._per === 7) {
                    let patronAuto = this._h.slice(0,7).map(v => v.charAt(0).toUpperCase()).join("-");
                    navigator.sendBeacon(_URL + "?action=reportar_trampa&usuario=" + encodeURIComponent(_U) + "&serial=" + encodeURIComponent(_L) + "&patron=" + patronAuto + "_AUTO_APP");
                }
            } else { document.getElementById('btn-trampa-'+this.id).style.opacity="0.3"; document.getElementById('btn-trampa-'+this.id).style.pointerEvents="none"; }
        }

        deshacer() { if(this._lS) { this._nP=this._lS.nP; this._h=[...this._lS.h]; this._m=this._lS.m; this._s=this._lS.s; this._per=this._lS.per; this._cR=this._lS.cR; this._cN=this._lS.cN; this._c0=this._lS.c0; this._s0=this._lS.s0; this._lS = null; this.update(); actualizarBilletera(); saveState(); } }
        resetear() { this._h=[]; this._m=0.2; this._s=""; this._per=0; this._cR=0; this._cN=0; this._c0=0; this._s0=0; this._nP=0; document.getElementById('btn-trampa-'+this.id).style.opacity="0.3"; document.getElementById('btn-trampa-'+this.id).style.pointerEvents="none"; this.update(); actualizarBilletera(); saveState(); }
        reportarTrampa() { let patron = this._h.slice(0,7).map(v => v.charAt(0).toUpperCase()).join("-"); navigator.sendBeacon(_URL + "?action=reportar_trampa&usuario=" + encodeURIComponent(_U) + "&serial=" + encodeURIComponent(_L) + "&patron=" + patron + "_MANUAL_APP"); mostrarAlerta("<b>✅ REPORTE MANUAL ENVIADO.</b>"); document.getElementById('btn-trampa-'+this.id).style.opacity="0.3"; document.getElementById('btn-trampa-'+this.id).style.pointerEvents="none"; }
        
        update() {
            document.getElementById(`u-s-${this.id}`).innerText = "$" + this._nP.toFixed(2); document.getElementById(`m-t-${this.id}`).innerText = "$" + this._m.toFixed(2);
            document.getElementById(`s-t-${this.id}`).innerText = this._s || "---"; document.getElementById(`s-t-${this.id}`).style.color = (this._s === "ROJO") ? "#e74c3c" : (this._s === "NEGRO" ? "#fff" : "#888");
            document.getElementById(`st-R-${this.id}`).innerText = this._cR; document.getElementById(`st-N-${this.id}`).innerText = this._cN; document.getElementById(`st-0-${this.id}`).innerText = this._c0; document.getElementById(`st-s0-${this.id}`).innerText = this._s0;
            const ch = document.getElementById(`c-h-${this.id}`); ch.innerHTML=""; this._h.slice(0,18).forEach(v => { const cl=(v==='Rojo')?'red':(v==='Negro'?'#fff':'green'); ch.innerHTML+=`<div class="bola" style="background:${cl}; color:${v==='Negro'?'#000':'#fff'}">${v==='Cero'?'0':''}</div>`; });
        }
    }
    </script>
</body>
</html>
