<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TECNOENTRETE VIP v55.2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --c1: #e74c3c; --c2: #2c3e50; --c3: #27ae60; --c4: #f1c40f; --c5: #00e5ff; --c8: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none !important; -webkit-user-select: none !important; }
        html, body { height: 100dvh; width: 100vw; overflow: hidden; margin: 0; color: white; font-family: 'Segoe UI', sans-serif; background: url('https://raw.githubusercontent.com/tecnoentretenciones-lang/tecno-vip-1/main/image_1209a3.jpg') no-repeat center center fixed; background-size: cover; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: -1; }
        body { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
        #p-l, #app-principal { width: 100%; height: 100dvh; max-width: 500px; display: flex; flex-direction: column; padding: 12px; }
        #p-l { position: fixed; top: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; }
        .c-l { background: rgba(20, 20, 20, 0.95); border: 2px solid var(--c5); border-radius: 25px; padding: 25px; width: 100%; text-align: center; box-shadow: 0 0 30px rgba(0,229,255,0.2); }
        .ruleta-logo { width: 70px; height: 70px; margin-bottom: 10px; animation: rotar 5s linear infinite; filter: drop-shadow(0 0 10px var(--c5)); }
        @keyframes rotar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .legal-box { background: rgba(231, 76, 60, 0.2); border: 1px solid var(--c1); padding: 10px; border-radius: 12px; margin-bottom: 15px; font-size: 11px; color: #ff8888; font-weight: bold; }
        .i-s { width: 100%; background: #000; border: 2px solid #555; color: var(--c4); padding: 15px; border-radius: 12px; font-size: 22px; text-align: center; margin-bottom: 15px; outline: none; font-weight: bold; }
        .b-a { background: var(--c5); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 16px; margin-bottom: 10px; }
        #app-principal { display: none; justify-content: flex-start; }
        .tmr-big { background:#000; border:2px solid var(--c5); border-radius:15px; padding:15px; text-align:center; font-size: 32px; color: var(--c5); font-weight: 900; margin-bottom:8px; text-shadow: 0 0 10px var(--c5); }
        .ganancia-box { background: #000; border: 1px solid #333; border-radius: 15px; padding: 12px; display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        .stats-row { display: flex; justify-content: space-around; width: 100%; }
        .panel { background: var(--c8); border: 1px solid #333; border-radius: 15px; padding: 15px; display: flex; flex-direction: column; gap: 10px; flex-grow: 1; justify-content: space-around; }
        .b-i { flex: 1; height: 75px; border: none; border-radius: 15px; font-size: 32px; font-weight: bold; color: white; cursor: pointer; }
        .c-c { background: #000; border: 1px solid #222; border-radius: 12px; padding: 8px; display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; height: 95px; overflow-y: auto; }
        .bola { width: 25px; height: 25px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; }
        .wsp-f { margin-top: 15px; background: #25d366; padding: 14px; border-radius: 12px; display: flex; justify-content: center; align-items: center; color: white; font-size: 15px; font-weight: bold; text-decoration: none; gap: 10px; border: 1px solid #fff; }
        #alerta-meta { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 10005; display: none; justify-content: center; align-items: center; flex-direction: column; }
        .nube-voladora { background: linear-gradient(135deg, #f1c40f, #f39c12); color: #000; padding: 25px; border-radius: 30px; text-align: center; max-width: 90%; border: 4px solid #fff; box-shadow: 0px 15px 35px rgba(241,196,15,0.5); animation: entrarVuelo 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn-nube { background: #000; color: #f1c40f; border: none; padding: 15px; border-radius: 15px; margin-top: 15px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="alerta-meta"><div class="nube-voladora"><div style="font-size: 50px;">🛑💰✨</div><h2 style="margin: 10px 0; font-weight: 900; line-height: 1.1;">¡OBJETIVO LOGRADO!</h2><p style="margin: 10px 0; font-weight: bold; font-size: 16px;">Has ganado el 20% de tu capital.</p><button class="btn-nube" onclick="aceptarMeta()">OK, ENTIENDO</button></div></div>

    <div id="p-l">
        <div class="c-l">
            <img src="https://cdn-icons-png.flaticon.com/512/1055/1055673.png" class="ruleta-logo">
            <h1 style="margin: 0 0 5px 0; font-size: 24px; color:white;">TECNOENTRETE VIP</h1>
            <p style="font-size: 14px; color: var(--c4); font-weight: bold; margin-bottom: 15px;">SOFTWARE PARA GANARLE A LA RULETA</p>
            <div class="legal-box">⚠️ AVISO: El uso es bajo su propio riesgo.</div>
            
            <div id="e-m" style="color: #ff4757; font-size: 13px; margin-bottom: 10px; font-weight: bold;"></div>
            <button id="btn-acepto" class="b-a">ACEPTO Y COMIENZO</button>

            <div id="step-1" style="display:none">
                <input type="text" id="l-i" class="i-s" placeholder="INGRESE LICENCIA" autocomplete="off">
                <button class="b-a" id="btn-validar">VALIDAR LICENCIA</button>
            </div>

            <div id="step-2" style="display:none">
                <input type="number" id="c-init" class="i-s" placeholder="SALDO EN MESA" step="0.01">
                <button class="b-a" id="btn-entrar-nuevo">ENTRAR A JUGAR</button>
                <div id="btn-continuar-box" style="display:none; margin-top:10px;">
                    <button class="b-a" id="btn-continuar-sesion" style="background:#27ae60; color:white;">SINCRONIZAR SESIÓN</button>
                </div>
            </div>
            <a href="https://wa.me/56995931641" class="wsp-f"><i class="fab fa-whatsapp"></i> SOPORTE</a>
        </div>
    </div>

    <div id="app-principal">
        <div id="tmr" class="tmr-big">00d 00h 00m 00s</div>
        <div class="ganancia-box">
            <div style="font-size: 11px; color: #ffae00; font-weight: bold; text-align: center; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 5px;">INICIO: <span id="val-inicial">$0.00</span></div>
            <div class="stats-row">
                <div style="flex: 1; border-right: 1px solid #333; text-align: center;"><div style="font-size: 10px; color: #888;">SALDO</div><div style="font-size: 22px; font-weight: 900; color: #fff;" id="cap-val">$0.00</div></div>
                <div style="flex: 1; text-align: center;"><div style="font-size: 10px; color: #888;">NETO</div><div style="font-size: 22px; font-weight: 900; color: var(--c5);" id="n-g">$0.00</div></div>
            </div>
        </div>
        <div class="panel">
            <div style="background: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 20px; text-align: center;"><div id="s-t" style="font-size:75px; font-weight:900; line-height:1;">---</div><div id="m-t" style="color:var(--c3); font-weight:900; font-size:26px; margin-top:10px;">$0.20</div></div>
            <div style="display: flex; gap: 10px;"><button class="b-i" id="btn-R" style="background:var(--c1);">R</button><button class="b-i" id="btn-N" style="background:var(--c2);">N</button><button class="b-i" id="btn-0" style="background:var(--c3);">0</button></div>
            <div id="c-h" class="c-c"></div>
            <div style="display: flex; gap: 8px;">
                <button style="background:transparent; color:#555; border:1px solid #222; padding:12px; border-radius:10px; flex:1;" id="btn-undo">CORREGIR</button>
                <button style="background:transparent; color:#e74c3c; border:1px solid #e74c3c; padding:12px; border-radius:10px; flex:1;" id="btn-reset">RESET</button>
            </div>
        </div>
    </div>

    <script>
    (function(){
        // --- CONFIGURACIÓN ---
        const _uA = "https://script.google.com/macros/s/AKfycbxFg9jyzTaJQwjdOyvpeq0ZmhCf4BegqGdRIQsWoZjF68Rs4Yq7kAW-1Fc0xyc1a6Ru/exec";
        
        const getHID = () => {
            let key = localStorage.getItem('_tecno_super_key_v2');
            if(!key){
                let nav = navigator.userAgent.indexOf("Chrome") > -1 ? "CHR" : "SAF";
                key = 'VIP-' + nav + '-' + Math.random().toString(36).substring(2, 10).toUpperCase();
                localStorage.setItem('_tecno_super_key_v2', key);
            }
            return key;
        };

        let _ba=0, _cI=0, _nG=0, _g=0, _p=0, _h=[], _m=0.2, _s="", _uL="", _uT="", _uS=0, _saveTimer=null, _proximaMeta=0;

        document.getElementById('btn-acepto').onclick = () => {
            document.getElementById('btn-acepto').style.display='none';
            document.getElementById('step-1').style.display='block';
        };

        document.getElementById('btn-validar').onclick = async function(){
            const s=document.getElementById('l-i').value.trim().toUpperCase(); if(!s) return;
            this.innerText="CONECTANDO...";
            const hid = getHID();
            try {
                const r = await fetch(_uA+"?action=validar&serial="+s+"&hid="+hid+"&token=T-"+Date.now());
                const d = await r.json();
                if(d.status==="success"){
                    _uL=s; _uS=parseInt(d.segundos);
                    if(d.estado_nube) {
                        localStorage.setItem('tecno_save_'+_uL, d.estado_nube);
                        document.getElementById('btn-continuar-box').style.display='block';
                    }
                    document.getElementById('step-1').style.display='none';
                    document.getElementById('step-2').style.display='block';
                } else { document.getElementById('e-m').innerText=d.mensaje; this.innerText="VALIDAR LICENCIA"; }
            } catch(e){ document.getElementById('e-m').innerText="ERROR DE RED"; this.innerText="VALIDAR LICENCIA"; }
        };

        document.getElementById('btn-entrar-nuevo').onclick = () => {
            const v=parseFloat(document.getElementById('c-init').value); if(isNaN(v)||v<=0) return;
            _ba=v; _cI=v; _nG=0; _h=[]; _m=0.2; _proximaMeta = _ba * 1.20;
            _arrancar();
        };

        document.getElementById('btn-continuar-sesion').onclick = () => {
            const sv = localStorage.getItem('tecno_save_'+_uL);
            if(sv){
                const x=JSON.parse(sv); _ba=x.ba; _nG=x.nG||0; _cI=x.cI||x.ba; _h=x.h||[]; _m=x.m||0.2; _proximaMeta = _ba * 1.20;
            }
            _arrancar();
        };

        function _arrancar(){
            document.getElementById('p-l').style.display='none';
            document.getElementById('app-principal').style.display='flex';
            document.getElementById('val-inicial').innerText = "$"+_cI.toFixed(2);
            setInterval(_fClock, 1000); _fUpd();
        }

        function _fR(c){
            if(_s!==""){
                if(c.toUpperCase()===_s){ _ba+=_m; _nG+=_m; _m=0.2; _g++; }
                else if(c!=='Cero'){ _ba-=_m; _nG-=_m; _m*=2; _p++; }
            }
            _h.unshift(c); _calc(); _fUpd(); _save();
            if(_ba >= _proximaMeta) document.getElementById('alerta-meta').style.display='flex';
        }

        function _calc() {
            if(_h.length === 0) return;
            let u=_h[0];
            _s = (u === "Rojo") ? "NEGRO" : "ROJO";
        }

        function _fUpd(){
            document.getElementById('cap-val').innerText="$"+_ba.toFixed(2);
            document.getElementById('n-g').innerText="$"+_nG.toFixed(2);
            document.getElementById('s-t').innerText=_s||"---";
            document.getElementById('s-t').style.color=(_s==="ROJO")?"#e74c3c":"#fff";
            document.getElementById('m-t').innerText="$"+_m.toFixed(2);
            const ch=document.getElementById('c-h'); ch.innerHTML="";
            _h.slice(0,20).forEach((v,i)=>{
                const cl=(v==='Rojo')?'red':(v==='Negro'?'#fff':'green');
                ch.innerHTML+=`<div class="bola" style="background:${cl}; color:${v==='Negro'?'#000':'#fff'}">${v==='Cero'?'0':''}</div>`;
            });
        }

        function _fClock(){ if(_uS>0){ _uS--; let h=Math.floor(_uS/3600), m=Math.floor((_uS%3600)/60), s=_uS%60; document.getElementById('tmr').innerText=`${h}h ${m}m ${s}s`; } }
        function _save(){
            const obj = {ba:_ba, nG:_nG, cI:_cI, h:_h, m:_m, s:_s};
            localStorage.setItem('tecno_save_'+_uL, JSON.stringify(obj));
            clearTimeout(_saveTimer);
            _saveTimer = setTimeout(() => {
                new Image().src = _uA+"?action=guardar&licencia="+_uL+"&estado="+encodeURIComponent(JSON.stringify(obj));
            }, 2000);
        }

        window.aceptarMeta = () => { document.getElementById('alerta-meta').style.display='none'; _proximaMeta = _ba * 1.20; };
        document.getElementById('btn-R').onclick=()=>_fR('Rojo');
        document.getElementById('btn-N').onclick=()=>_fR('Negro');
        document.getElementById('btn-0').onclick=()=>_fR('Cero');
        document.getElementById('btn-reset').onclick=()=>{ if(confirm("¿Reset mesa?")){ _h=[]; _m=0.2; _s=""; _fUpd(); } };
    })();
    </script>
</body>
</html>
