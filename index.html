<script>
(function(){
    // Bloqueo de Teclado
    document.onkeydown = function(e) { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false; };

    let _ba=10.0, _g=0, _p=0, _h=[], _ia={t:5,s:5}, _m=0.2, _s="", _uL="", _uT="", _uS=0;
    const _uA = "https://script.google.com/macros/s/AKfycbyL48_uVFXFE3wENSlH6DDlLMM3d0VkCb2WDjJaKgijARdmpWw2SFdzRrwVu-I2vsSYGQ/exec";

    async function _fV(){
        const s=document.getElementById('l-i').value.trim().toUpperCase();
        if(!s) return;
        const btn = document.getElementById('btn-entrar');
        btn.innerText = "VERIFICANDO...";
        _uT = "W-" + Date.now(); // Genera Token único para evitar doble sesión
        
        try{
            const r=await fetch(`${_uA}?action=validar&serial=${s}&token=${_uT}&version=16.3`);
            const d=await r.json();
            
            if(d.status==="success"){
                _uL=s; 
                _uS=parseInt(d.segundos); // Trae el tiempo real del Excel
                
                document.getElementById('p-l').style.display='none';
                document.getElementById('app-principal').style.display='flex';
                
                // Recuperar memoria local
                const sv = localStorage.getItem('tecno_save_'+_uL);
                if(sv){ const x=JSON.parse(sv); _ba=x.ba; _g=x.g; _p=x.p; _h=x.h; _ia=x.ia; _m=x.m; _s=x.s; _fUpd(); }
                
                // Iniciar Reloj y Chequeo de Sesión
                setInterval(_fClock, 1000); 
                setInterval(_fCheck, 8000); // Revisa cada 8 seg si hay alguien más conectado
            } else { 
                document.getElementById('e-m').innerText = d.mensaje;
                btn.innerText = "ENTRAR";
            }
        } catch(e) { 
            document.getElementById('e-m').innerText = "ERROR DE CONEXIÓN"; 
            btn.innerText = "ENTRAR"; 
        }
    }

    // --- FUNCIÓN RELOJ ---
    function _fClock(){
        if(_uS > 0){
            _uS--;
            let m=Math.floor(_uS/60), s=_uS%60;
            document.getElementById('tmr').innerText = m + ":" + (s<10?'0'+s:s);
        } else {
            alert("TIEMPO AGOTADO");
            location.reload();
        }
    }

    // --- BLOQUEO DOBLE SESIÓN ---
    async function _fCheck(){
        try {
            const r = await fetch(`${_uA}?action=chequear_sesion&serial=${_uL}&token=${_uT}`);
            const d = await r.json();
            if(d.status === "kick") {
                alert("SESIÓN ABIERTA EN OTRO DISPOSITIVO");
                location.reload();
            }
        } catch(e) {}
    }

    function _fR(c){
        if(_s !== ""){
            if(c.toUpperCase() === _s){ _ba += _m; _m = 0.20; _g++; }
            else if(c !== 'Cero') { _ba -= _m; _m *= 2; _p++; }
        }
        _h.unshift(c);
        if(c !== "Cero"){
            let l = c.toUpperCase();
            if(_h.length > 1){
                (_h[0] === _h[1]) ? _ia.t += 1.5 : _ia.t -= 1;
                (_h[0] !== _h[1]) ? _ia.s += 1.5 : _ia.s -= 1;
            }
            _ia.t = Math.max(0, Math.min(10, _ia.t));
            _ia.s = Math.max(0, Math.min(10, _ia.s));
            _s = (_ia.t >= _ia.s) ? l : (l === "ROJO" ? "NEGRO" : "ROJO");
        }
        localStorage.setItem('tecno_save_'+_uL, JSON.stringify({ba:_ba,g:_g,p:_p,h:_h,ia:_ia,m:_m,s:_s}));
        _fUpd();
    }

    function _fUpd(){
        document.getElementById('cap-val').innerText = "$" + _ba.toFixed(2);
        document.getElementById('gp-val').innerText = _g + " / " + _p;
        document.getElementById('s-t').innerText = _s || "---";
        document.getElementById('s-t').style.color = (_s === "ROJO") ? "#e74c3c" : "#fff";
        document.getElementById('m-t').innerText = "$" + _m.toFixed(2);
        document.getElementById('n-v').innerText = "$" + (_ba - 10).toFixed(2);
        const ch = document.getElementById('c-h'); ch.innerHTML = "";
        _h.slice(0,10).forEach(v => {
            const color = (v === 'Rojo') ? 'red' : (v === 'Negro' ? '#fff' : 'green');
            const tColor = (v === 'Negro') ? '#000' : '#fff';
            ch.innerHTML += '<div class="bola" style="background:'+color+'; color:'+tColor+';">' + (v === 'Cero' ? '0' : '') + '</div>';
        });
        // Enviar datos al Excel en segundo plano
        new Image().src = _uA + "?action=guardar&licencia="+_uL+"&ganadas="+_g+"&perdidas="+_p+"&neto="+(_ba-10).toFixed(2);
    }

    document.getElementById('btn-entrar').onclick = _fV;
    document.getElementById('btn-R').onclick = function(){ _fR('Rojo'); };
    document.getElementById('btn-N').onclick = function(){ _fR('Negro'); };
    document.getElementById('btn-0').onclick = function(){ _fR('Cero'); };
})();
</script>
