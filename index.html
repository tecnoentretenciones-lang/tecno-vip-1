<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TECNOENTRETE VIP v55.2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --c1: #e74c3c; --c2: #2c3e50; --c3: #27ae60; --c4: #f1c40f; --c5: #00e5ff; --c8: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100dvh; width: 100vw; overflow: hidden; margin: 0; color: white; font-family: 'Segoe UI', sans-serif; background: url('https://raw.githubusercontent.com/tecnoentretenciones-lang/tecno-vip-1/main/image_1209a3.jpg') no-repeat center center fixed; background-size: cover; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: -1; }
        body { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
        
        #p-l, #app-principal { width: 100%; height: 100dvh; max-width: 500px; display: flex; flex-direction: column; padding: 12px; }
        #p-l { position: fixed; top: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; }
        .c-l { background: rgba(20, 20, 20, 0.95); border: 2px solid var(--c5); border-radius: 25px; padding: 25px; width: 100%; text-align: center; }
        
        .ruleta-logo { width: 70px; height: 70px; margin-bottom: 10px; animation: rotar 5s linear infinite; filter: drop-shadow(0 0 10px var(--c5)); }
        @keyframes rotar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .i-s { width: 100%; background: #000; border: 2px solid #555; color: var(--c4); padding: 15px; border-radius: 12px; font-size: 22px; text-align: center; margin-bottom: 15px; outline: none; }
        .b-a { background: var(--c5); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 16px; margin-bottom: 10px; }
        
        #app-principal { display: none; }
        .tmr-big { background:#000; border:2px solid var(--c5); border-radius:15px; padding:15px; text-align:center; font-size: 30px; color: var(--c5); font-weight: 900; margin-bottom:10px; }
        
        .stats-row { display: flex; justify-content: space-around; background: #000; padding: 15px; border-radius: 15px; border: 1px solid #333; margin-bottom: 10px; }
        .panel { background: #111; border: 1px solid #333; border-radius: 15px; padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-around; }
        
        .b-i { flex: 1; height: 70px; border: none; border-radius: 15px; font-size: 30px; font-weight: bold; color: white; cursor: pointer; }
        .c-c { background: #000; border-radius: 12px; padding: 10px; display: flex; flex-wrap: wrap; gap: 5px; height: 80px; overflow: hidden; }
        .bola { width: 25px; height: 25px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="p-l">
        <div class="c-l">
            <img src="https://cdn-icons-png.flaticon.com/512/1055/1055673.png" class="ruleta-logo">
            <h1 style="margin: 0;">TECNOENTRETE VIP</h1>
            <p style="color: var(--c4); font-weight: bold;">SOFTWARE PROFESIONAL</p>
            
            <div id="step-1">
                <input type="text" id="l-i" class="i-s" placeholder="LICENCIA">
                <button class="b-a" id="btn-validar">ENTRAR</button>
            </div>

            <div id="step-2" style="display:none">
                <input type="number" id="c-init" class="i-s" placeholder="SALDO EN MESA">
                <button class="b-a" id="btn-jugar">COMENZAR JUEGO</button>
            </div>
            <p style="font-size: 11px; color: #888;">Al entrar aceptas los términos de uso.</p>
        </div>
    </div>

    <div id="app-principal">
        <div id="tmr" class="tmr-big">00:00:00</div>
        
        <div class="stats-row">
            <div style="text-align:center;">
                <div style="font-size: 10px; color: #888;">SALDO ACTUAL</div>
                <div id="cap-val" style="font-size: 20px; font-weight: bold;">$0.00</div>
            </div>
            <div style="text-align:center;">
                <div style="font-size: 10px; color: #888;">NETO GLOBAL</div>
                <div id="n-g" style="font-size: 20px; font-weight: bold; color: var(--c5);">$0.00</div>
            </div>
        </div>

        <div class="panel">
            <div id="s-t" style="font-size: 80px; text-align: center; font-weight: 900;">---</div>
            <div id="m-t" style="color: var(--c3); text-align: center; font-size: 24px; font-weight: bold;">$0.20</div>
            
            <div style="display: flex; gap: 10px;">
                <button class="b-i" id="btn-R" style="background:var(--c1);">R</button>
                <button class="b-i" id="btn-N" style="background:var(--c2);">N</button>
                <button class="b-i" id="btn-0" style="background:var(--c3);">0</button>
            </div>

            <div id="c-h" class="c-c"></div>
            <button style="background: transparent; color: #888; border: 1px solid #333; padding: 10px; border-radius: 10px;" onclick="location.reload()">CERRAR SESIÓN</button>
        </div>
    </div>

    <script>
        const _uA = "https://script.google.com/macros/s/AKfycbxFg9jyzTaJQwjdOyvpeq0ZmhCf4BegqGdRIQsWoZjF68Rs4Yq7kAW-1Fc0xyc1a6Ru/exec";
        
        let _uL = "", _ba = 0, _nG = 0, _m = 0.2, _s = "", _h = [];

        const getHID = () => {
            let id = localStorage.getItem('tecno_id');
            if(!id) { id = 'DEV-' + Math.random().toString(36).substring(2,10).toUpperCase(); localStorage.setItem('tecno_id', id); }
            return id;
        };

        document.getElementById('btn-validar').onclick = async function() {
            _uL = document.getElementById('l-i').value.trim().toUpperCase();
            if(!_uL) return;
            this.innerText = "VALIDANDO...";
            try {
                const r = await fetch(_uA + "?action=validar&serial=" + _uL + "&hid=" + getHID());
                const d = await r.json();
                if(d.status === "success") {
                    document.getElementById('step-1').style.display = 'none';
                    document.getElementById('step-2').style.display = 'block';
                } else { alert(d.mensaje); this.innerText = "ENTRAR"; }
            } catch(e) { alert("Error de conexión"); this.innerText = "ENTRAR"; }
        };

        document.getElementById('btn-jugar').onclick = () => {
            _ba = parseFloat(document.getElementById('c-init').value) || 0;
            document.getElementById('p-l').style.display = 'none';
            document.getElementById('app-principal').style.display = 'flex';
            _upd();
        };

        function _fR(col) {
            if(_s !== "") {
                if(col.toUpperCase() === _s) { _ba += _m; _nG += _m; _m = 0.2; }
                else if(col !== 'Cero') { _ba -= _m; _nG -= _m; _m *= 2; }
            }
            _h.unshift(col);
            _s = (col === "Rojo") ? "NEGRO" : "ROJO";
            _upd();
            _save();
        }

        function _upd() {
            document.getElementById('cap-val').innerText = "$" + _ba.toFixed(2);
            document.getElementById('n-g').innerText = "$" + _nG.toFixed(2);
            document.getElementById('s-t').innerText = _s || "---";
            document.getElementById('s-t').style.color = (_s === "ROJO") ? "#e74c3c" : "#fff";
            document.getElementById('m-t').innerText = "$" + _m.toFixed(2);
            const ch = document.getElementById('c-h'); ch.innerHTML = "";
            _h.slice(0,14).forEach(v => {
                const color = (v === "Rojo") ? "red" : (v === "Negro" ? "white" : "green");
                ch.innerHTML += `<div class="bola" style="background:${color}; color:black;">${v[0]}</div>`;
            });
        }

        function _save() {
            const estado = JSON.stringify({ba: _ba, nG: _nG, h: _h.slice(0,5), m: _m, s: _s});
            new Image().src = _uA + "?action=guardar&licencia=" + _uL + "&estado=" + encodeURIComponent(estado);
        }

        document.getElementById('btn-R').onclick = () => _fR('Rojo');
        document.getElementById('btn-N').onclick = () => _fR('Negro');
        document.getElementById('btn-0').onclick = () => _fR('Cero');
    </script>
</body>
</html>
